<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatPH | Friendlist</title>

<link rel="icon" type="image/png" href="image/chatph-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f1115;
--card:#171a21;
--border:#23262f;
--text:#ffffff;
--accent:#4da3ff;
--dim:#9ca3af;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);

    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 24px;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:100;
}
.header-left{
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
}
.menu-icon{
font-size:26px;
}
.logo{
width:32px;
border-radius:6px;
}
.brand{
font-weight:700;
}

/* SIDEBAR */
.sidebar{
position: fixed;
top: 0;
left: -260px;
width: 240px;
height: 100%;
background: rgba(21,25,33,0.75);
backdrop-filter: blur(12px);
border-right: 1px solid rgba(255,255,255,0.08);
padding-top: 70px;
transition: .3s;
z-index: 999;
}
.sidebar.open{ left:0; }

.sidebar a {
    display:block;
    padding:14px 20px;
    text-decoration:none;
    color:white;
    position: relative;
    overflow: hidden;
    z-index: 1;
}

/* ✨ sliding hover effect */
.sidebar a::before {
    content: "";
    position: absolute;
    left: -100%;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(59,130,246,0.1);
    transition: left 0.25s ease;
    z-index: 0;
}

.sidebar a:hover::before {
    left: 0;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.05);
    color: var(--accent);
}

.sidebar a.active{
background:rgba(59,130,246,0.15);
color:var(--accent);
border-left:3px solid var(--accent);
}

.indicator {
    position: absolute;
    left: 0;
    width: 4px;
    height: 44px;
    background: var(--accent);
    border-radius: 4px;
    top: 0;
    transition: 0.3s ease;
    box-shadow: 0 0 10px rgba(59,130,246,0.7);
}
    
/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
opacity:0;
pointer-events:none;
transition:.3s;
}
.overlay.active{
opacity:1;
pointer-events:auto;
}

/* MAIN */
.main{
max-width:520px;
margin:auto;
padding:16px;
flex:1;
}

/* FOOTER */
footer{
    text-align:center;
    padding:10px;
    font-size:13px;
    opacity:.6;
    background:var(--bg);
}
    
footer a:hover{
text-decoration:underline;
}

.tabs{
    display:flex;
    justify-content:center;
    background:var(--card);
    border-radius:20px;
    padding:6px;
    margin-bottom:20px;
    position: relative;
    z-index: 5;
}

.tab{
    padding:10px 20px;
    cursor:pointer;
    border-radius:16px;
    color:var(--dim);
    transition:.2s;
}

.tab.active{
    background:var(--accent);
    color:#000;
}

.panel-container{
    position:relative;
    overflow:visible;
    padding-top:10px;
}

.panel{
    display:none;
}

.panel.active{
    display:block;
    animation:slide .3s ease;
}

@keyframes slide{
    from{transform:translateX(20px);opacity:0;}
    to{transform:translateX(0);opacity:1;}
}

.menu-btn{
    cursor:pointer;
    margin-left:10px;
    font-size:18px;
    font-weight:bold;
    padding:6px 10px;
    border-radius:8px;
    transition:.2s;
}
.menu-btn:hover{
    background:rgba(255,255,255,0.08);
}

.dropdown{
    position:absolute;
    right:10px;
    top:40px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    display:none;
    min-width:140px;
    z-index:9999;
}

.dropdown div{
    padding:10px;
    cursor:pointer;
}

.dropdown div:hover{
    background:#1f2937;
}

.friend-card{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border-radius:14px;
    margin-bottom:10px;
    position: relative;
    overflow: visible;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
    transition:.25s;
    z-index: 1;
}

.friend-card:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,0.08);
    z-index: 50;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
    background:#222;
}

.action-btn{
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:12px;
    margin-left:6px;
    transition:.2s;
}

.accept{
    background:#22c55e;
    color:#000;
}
.accept:hover{
    background:#16a34a;
}

.reject{
    background:#ef4444;
    color:#000;
}
.reject:hover{
    background:#dc2626;
}

.friend-card.removing {
    opacity: 0;
    transform: translateX(20px);
}

#logoutBtn {
    cursor: pointer;
    color: #aaa;
    font-weight: 600;
    font-size: 14px;
}
    
#logoutBtn:hover {
    color: #ff4b4b;
}

.pin-icon{
    position:absolute;
    top:6px;
    right:6px;
    font-size:14px;
}
    
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="header-left">
<span class="menu-icon" onclick="toggleSidebar()">☰</span>

<div onclick="window.location.href='home.html'" style="display:flex;align-items:center;gap:12px;cursor:pointer;">
    <img src="image/chatph-logo.png" class="logo">
    <span class="brand">ChatPH</span>
</div>

</div>

<div style="display:flex;align-items:center;gap:12px;">
    <span id="userName">Loading...</span>
    <div id="logoutBtn">Logout</div>
</div>
</header>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a href="home.html">Home</a>
<a href="msg.html">Messages</a>
<a href="#" class="active">Friends</a>
<a href="srch.html">Search User</a>
<a href="prfl.html">Profile</a>

<div class="indicator" id="indicator"></div>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar(true)"></div>

<!-- MAIN -->
<div class="main">
<div class="tabs">
    <div class="tab active" data-tab="friends">Friends</div>
    <div class="tab" data-tab="pending">Pending</div>
    <div class="tab" data-tab="requests">Requests</div>
</div>

<div class="panel-container">
    <div id="friendsPanel" class="panel active"></div>
    <div id="pendingPanel" class="panel"></div>
    <div id="requestsPanel" class="panel"></div>
</div>
</div>

<!-- FOOTER -->
<footer style="
text-align:center;
padding:30px 20px;
color:#94a3b8;
border-top:1px solid rgba(255,255,255,0.08);
margin-top:40px;
">
<div>© 2026 ChatPH • All Rights Reserved</div>

<div style="margin-top:6px;font-size:13px;">
<a href="termsandprivacy.html?tab=about" style="color:#4da3ff;text-decoration:none;">About</a>
&nbsp;|&nbsp;
<a href="termsandprivacy.html?tab=privacy" style="color:#4da3ff;text-decoration:none;">Privacy</a>
&nbsp;|&nbsp;
<a href="termsandprivacy.html?tab=terms" style="color:#4da3ff;text-decoration:none;">Terms</a>
&nbsp;|&nbsp;
<a href="termsandprivacy.html?tab=contact" style="color:#4da3ff;text-decoration:none;">Contact</a>
</div>

<div style="margin-top:6px;font-size:12px;opacity:.7;">
Made with ❤️ in the Philippines
</div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
getDocs,
getDoc,
collection,
setDoc,
serverTimestamp,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyB0A7O_FkTbekDZgjjn6wGVIPKdJ1nkq9E",
  authDomain: "chatph-cc187.firebaseapp.com",
  projectId: "chatph-cc187",
  storageBucket: "chatph-cc187.firebasestorage.app",
  messagingSenderId: "324012163441",
  appId: "1:324012163441:web:7a54be2231ad2cae71f6d0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* SIDEBAR */
window.toggleSidebar = (close=false)=>{
const s = document.getElementById("sidebar");
const o = document.getElementById("overlay");

if(close){
s.classList.remove("open");
o.classList.remove("active");
}else{
s.classList.toggle("open");
o.classList.toggle("active");
}
};

/* AUTH */
onAuthStateChanged(auth, (user)=>{
if(user){
    document.getElementById("userName").innerText =
    user.displayName || user.email;

    setOnlineStatus(user);

    loadFriends(user.uid);
    loadPending(user.uid);
    loadRequests(user.uid);

}else{
    window.location.href="index.html";
}
});

document.getElementById("logoutBtn").onclick = async () => {
    await signOut(auth);
    window.location.href = "index.html";
};

const links = document.querySelectorAll(".sidebar a");
const indicator = document.getElementById("indicator");

links.forEach(link => {
    link.onclick = () => {
        links.forEach(l => l.classList.remove("active"));
        link.classList.add("active");

        indicator.style.top = link.offsetTop + "px";
        indicator.style.height = link.offsetHeight + "px";
    };
});

window.addEventListener("load", () => {
    const active = document.querySelector(".sidebar a.active") || links[0];
    indicator.style.top = active.offsetTop + "px";
    indicator.style.height = active.offsetHeight + "px";
});

function setOnlineStatus(user){
    const userRef = doc(db, "status", user.uid);

    setDoc(userRef, {
        online: true,
        lastSeen: serverTimestamp()
    });

    window.addEventListener("beforeunload", () => {
        setDoc(userRef, {
            online: false,
            lastSeen: serverTimestamp()
        });
    });
}

const tabs = document.querySelectorAll(".tab");

tabs.forEach(tab=>{
    tab.onclick = ()=>{
        tabs.forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");

        document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));

        document.getElementById(tab.dataset.tab + "Panel").classList.add("active");
    };
});

function renderFriends(list){
    const panel = document.getElementById("friendsPanel");
    panel.innerHTML = "";

    list.forEach(f=>{
        panel.innerHTML += `
        <div class="friend-card" style="position:relative;">
            ${f.pinned ? '<div class="pin-icon">📌</div>' : ''}
            <img src="${f.photo}" class="avatar">

            <div>
                <div>${f.name}</div>
                <div style="font-size:12px;color:#9ca3af">
<span style="color:${f.online ? '#22c55e' : '#9ca3af'}">●</span>
<span style="color:#9ca3af;font-size:12px;">
    ${f.online ? "Online" : "Offline"}
</span>
                </div>
            </div>

            <div style="margin-left:auto;font-size:12px;">
${f.createdAt?.toDate().toLocaleDateString('en-US', {
    month: 'long',
    day: 'numeric',
    year: 'numeric'
})}
<br>
<span style="font-size:11px;color:#9ca3af;">
${f.createdAt?.toDate().toLocaleTimeString('en-US', {
    hour: 'numeric',
    minute: '2-digit'
})}
</span>
            </div>

            <!-- ⋮ BUTTON -->
            <div class="menu-btn" onclick="toggleMenu(this)">⋮</div>

            <!-- ✅ DROPDOWN -->
            <div class="dropdown">
                <div onclick="viewProfile('${f.id}')">View Profile</div>
                <div onclick="sendMessage('${f.id}')">Message</div>
                <div onclick="pinFriend('${f.id}', ${f.pinned})">
                    ${f.pinned ? 'Unpin Friend' : 'Pin Friend'}
                </div>
                <div onclick="removeFriend('${f.id}')">Remove Friend</div>
            </div>
        </div>
        `;
    });
}

function renderPending(list){
    const panel = document.getElementById("pendingPanel");
    panel.innerHTML = "";

    list.forEach(u=>{
        panel.innerHTML += `
        <div class="friend-card">
            <img src="${u.photo}" class="avatar">
            <div>${u.name}</div>

            <div style="margin-left:auto;">
                <button class="action-btn reject" onclick="cancelRequest('${u.id}', event)">Cancel</button>
            </div>
        </div>
        `;
    });
}

function renderRequests(list){
    const panel = document.getElementById("requestsPanel");
    panel.innerHTML = "";

    list.forEach(u=>{
        panel.innerHTML += `
        <div class="friend-card">
            <img src="${u.photo}" class="avatar">
            <div>${u.name}</div>

            <div style="margin-left:auto;">
                <button class="action-btn reject" onclick="reject('${u.id}', event)">✕</button>
                <button class="action-btn accept" onclick="accept('${u.id}')">✔</button>
            </div>
        </div>
        `;
    });
}

async function accept(uid){
    const current = auth.currentUser;

    // add both as friends
    await setDoc(doc(db,"friends",current.uid,"list",uid),{
        uid,
        createdAt:new Date()
    });

    await setDoc(doc(db,"friends",uid,"list",current.uid),{
        uid:current.uid,
        createdAt:new Date()
    });

    // ✅ remove request (both sides)
    await deleteDoc(doc(db,"requests",current.uid,"received",uid));
    await deleteDoc(doc(db,"pending",uid,"sent",current.uid));
}

async function cancelRequest(uid, event){
    const current = auth.currentUser;

    const card = event.target.closest('.friend-card');
    card.classList.add('removing');

    setTimeout(async ()=>{
        await deleteDoc(doc(db,"pending",current.uid,"sent",uid));
        await deleteDoc(doc(db,"requests",uid,"received",current.uid));
    }, 200);
}

async function removeFriend(uid){
    await deleteDoc(doc(db,"friends",auth.currentUser.uid,"list",uid));
    await deleteDoc(doc(db,"friends",uid,"list",auth.currentUser.uid));
}

import { onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function loadPending(uid){
    const ref = collection(db,"pending",uid,"sent");
    onSnapshot(ref, async (snap)=>{
let list = [];
for (const d of snap.docs){
    const data = d.data();

    const userDoc = await getDoc(doc(db,"users",data.uid));
    const userData = userDoc.data();

    // ✅ FIX HERE
    const statusDoc = await getDoc(doc(db,"status",data.uid));
    const statusData = statusDoc.data();

    list.push({
        id: data.uid,
        name: (userData?.firstName || "") + " " + (userData?.lastName || ""),
        photo: userData?.pfpBase64 || "https://cdn-icons-png.flaticon.com/512/3177/3177440.png",
        createdAt: data.createdAt,
        online: statusData?.online || false
    });
}

// ✅ SORT HERE (before render)
list.sort((a,b)=>{
    if (a.pinned !== b.pinned){
        return b.pinned - a.pinned; // pinned first
    }
    return a.name.localeCompare(b.name); // A-Z
});

        // ✅ COUNT UPDATE
        document.querySelector('[data-tab="pending"]').innerText =
            `Pending (${list.length})`;

        renderPending(list);
    });
}

async function loadRequests(uid){
    const ref = collection(db,"requests",uid,"received");
    onSnapshot(ref, async (snap)=>{
        let list = [];

        for(const d of snap.docs){
            const data = d.data();
            const userDoc = await getDoc(doc(db,"users",data.uid));
            const userData = userDoc.data();

            list.push({
                id: data.uid,
                name: (userData?.firstName || "") + " " + (userData?.lastName || ""),
                photo: userData?.pfpBase64 || "https://cdn-icons-png.flaticon.com/512/3177/3177440.png"
            });
        }

        // ✅ COUNT UPDATE
        document.querySelector('[data-tab="requests"]').innerText =
            `Requests (${list.length})`;

        renderRequests(list);
    });
}

function loadFriends(uid){
    const ref = collection(db,"friends",uid,"list");

    onSnapshot(ref, async (snap)=>{
        let list = [];

        for (const d of snap.docs){
            const data = d.data();

            // 🔥 get user info
            const userDoc = await getDoc(doc(db,"users",data.uid));
            const userData = userDoc.data();

            // 🔥 get online status (FIXED POSITION)
            const statusDoc = await getDoc(doc(db,"status",data.uid));
            const statusData = statusDoc.data();

            // 🔥 push properly (NO const inside)
            list.push({
                id: data.uid,
                name: (userData?.firstName || "") + " " + (userData?.lastName || ""),
                photo: userData?.pfpBase64 || "https://cdn-icons-png.flaticon.com/512/3177/3177440.png",
                createdAt: data.createdAt,
                online: statusData?.online || false,
                pinned: data.pinned || false
            });
        }

        // 🔥 sort pinned first
        list.sort((a,b)=> (b.pinned === true) - (a.pinned === true));

        // 🔥 update tab title
        document.querySelector('[data-tab="friends"]').innerText =
            `Friends (${list.length})`;

        // 🔥 render UI
        renderFriends(list);
    });
}

async function reject(uid, event){
    const current = auth.currentUser;

    // 🎬 animate removal FIRST
    const card = event.target.closest('.friend-card');
    card.classList.add('removing');

    // ⏳ wait animation (optional but smooth)
    setTimeout(async ()=>{
        await deleteDoc(doc(db,"requests",current.uid,"received",uid));
        await deleteDoc(doc(db,"pending",uid,"sent",current.uid));
    }, 200);
}

window.toggleMenu = (btn)=>{
    const dropdown = btn.nextElementSibling;

    // close others
    document.querySelectorAll('.dropdown').forEach(d=>{
        if(d !== dropdown) d.style.display = 'none';
    });

    dropdown.style.display =
        dropdown.style.display === 'block' ? 'none' : 'block';
};

async function pinFriend(uid, currentState){
    await setDoc(doc(db,"friends",auth.currentUser.uid,"list",uid),{
        pinned: !currentState
    }, { merge:true });
}
window.pinFriend = pinFriend;
    
// click outside = close
window.addEventListener('click', (e)=>{
    if(!e.target.closest('.menu-btn') && !e.target.closest('.dropdown')){
        document.querySelectorAll('.dropdown').forEach(d=>{
            d.style.display = 'none';
        });
    }
});
    
window.accept = accept;
window.reject = reject;
window.cancelRequest = cancelRequest;
window.removeFriend = removeFriend;

window.sendMessage = (uid)=>{
    window.location.href = `msg.html?uid=${uid}`;
};

window.viewProfile = (uid)=>{
    window.location.href = `prfl.html?uid=${uid}`;
};
    
</script>
</body>
</html>
