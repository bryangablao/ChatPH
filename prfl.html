<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | ChatPH</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0e11;
--card:#151921;
--border:rgba(255,255,255,.08);
--text:#fff;
--dim:#94a3b8;
--accent:#3b82f6;
}

*{box-sizing:border-box;font-family:'Plus Jakarta Sans';}

body{
margin:0;
background:var(--bg);
color:var(--text);
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#0b0e11;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:1000;
}

/* COVER */
.cover{
position:relative;
height:200px;
background:#1e293b;
}

.cover img{
width:100%;
height:100%;
object-fit:cover;
}

/* EDIT BUTTON (TOP RIGHT FIXED) */
.edit-btn{
position:absolute;
top:15px;
right:15px;
background:rgba(0,0,0,.6);
border-radius:50%;
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* DROPDOWN MENU */
.menu{
position:absolute;
top:50px;
right:0;
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
padding:8px;
display:none;
min-width:160px;
z-index:999;
}

.menu div{
padding:8px;
font-size:13px;
cursor:pointer;
border-radius:8px;
}

.menu div:hover{
background:rgba(255,255,255,.05);
}

/* PROFILE CARD */
.card{
max-width:700px;
margin:-60px auto 20px;
background:var(--card);
padding:25px;
border-radius:20px;
border:1px solid var(--border);
text-align:center;
}

/* PROFILE PIC */
.pfp-wrap{
position:relative;
width:110px;
margin:-70px auto 10px;
}

.pfp{
width:110px;
height:110px;
border-radius:50%;
border:4px solid var(--card);
}

/* NAME */
h2{
margin:10px 0 5px;
}

.email{
font-size:13px;
color:var(--dim);
}

/* STATS */
.stats{
display:flex;
justify-content:center;
gap:30px;
margin:20px 0;
border-top:1px solid var(--border);
border-bottom:1px solid var(--border);
padding:15px 0;
}

.stats b{display:block}

/* BIO */
.bio{
background:rgba(255,255,255,.03);
padding:15px;
border-radius:12px;
margin-top:10px;
font-size:14px;
}

/* BUTTON */
.btn{
margin-top:15px;
padding:10px 18px;
background:var(--accent);
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

/* POSTS */
.feed{
max-width:550px;
margin:auto;
padding:0 15px 40px;
}

.post{
background:var(--card);
border:1px solid var(--border);
padding:15px;
border-radius:12px;
margin-top:10px;
}

.post small{
color:var(--dim);
}
</style>
</head>

<body>

<header>
<div>☰ ChatPH</div>
<div id="logoutBtn">Logout</div>
</header>

<!-- COVER -->
<div class="cover">
<img id="coverImg" src="https://images.unsplash.com/photo-1557683316-973673baf926">

<div class="edit-btn" onclick="toggleMenu('coverMenu')">✏️</div>

<div class="menu" id="coverMenu">
<div onclick="uploadCover()">Upload</div>
<div onclick="viewImage('coverImg')">View</div>
<div onclick="deleteCover()">Delete</div>
</div>
</div>

<!-- PROFILE -->
<div class="card">

<div class="pfp-wrap">
<img id="pfp" class="pfp" src="https://cdn-icons-png.flaticon.com/512/3177/3177440.png">

<div class="edit-btn" style="bottom:0;top:auto;right:0;" onclick="toggleMenu('pfpMenu')">✏️</div>

<div class="menu" id="pfpMenu" style="right:-20px;">
<div onclick="uploadPfp()">Upload</div>
<div onclick="viewImage('pfp')">View</div>
<div onclick="deletePfp()">Delete</div>
</div>
</div>

<h2 id="name">User</h2>
<div class="email" id="email">email</div>

<div class="stats">
<div><b id="posts">0</b><span>Posts</span></div>
<div><b>0</b><span>Friends</span></div>
<div><b>2026</b><span>Joined</span></div>
</div>

<div class="bio" id="bio">No bio yet</div>

<button class="btn" onclick="editBio()">Edit Bio</button>

</div>

<!-- POSTS -->
<div class="feed">
<h4>Recent Activity</h4>
<div id="postList"></div>
</div>

<input type="file" id="pfpInput" hidden>
<input type="file" id="coverInput" hidden>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
apiKey:"AIza...",
authDomain:"chatph-cc187.firebaseapp.com",
projectId:"chatph-cc187"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* MENU */
window.toggleMenu = (id)=>{
document.querySelectorAll('.menu').forEach(m=>m.style.display='none');
const el = document.getElementById(id);
el.style.display = el.style.display === 'block' ? 'none' : 'block';
};

/* VIEW IMAGE */
window.viewImage = (id)=>{
window.open(document.getElementById(id).src);
};

/* UPLOAD HANDLER */
function upload(file,type){
const reader=new FileReader();
reader.onload=async()=>{
const base64=reader.result;
const user=auth.currentUser;
const field = type==='pfp'?'pfpBase64':'coverBase64';

await setDoc(doc(db,"users",user.uid),{[field]:base64},{merge:true});
document.getElementById(type==='pfp'?'pfp':'coverImg').src=base64;
};
reader.readAsDataURL(file);
}

/* BUTTON ACTIONS */
window.uploadPfp=()=>pfpInput.click();
window.uploadCover=()=>coverInput.click();

pfpInput.onchange=e=>upload(e.target.files[0],'pfp');
coverInput.onchange=e=>upload(e.target.files[0],'cover');

window.deletePfp=async()=>{
document.getElementById("pfp").src="";
};

window.deleteCover=async()=>{
document.getElementById("coverImg").src="";
};

/* BIO */
window.editBio = async ()=>{
const text=prompt("Edit bio:");
if(!text) return;
const user=auth.currentUser;

await setDoc(doc(db,"users",user.uid),{bio:text},{merge:true});
document.getElementById("bio").innerText=text;
};

/* AUTH */
onAuthStateChanged(auth,async(user)=>{
if(!user) location="index.html";

document.getElementById("name").innerText=user.displayName;
document.getElementById("email").innerText=user.email;

const snap=await getDoc(doc(db,"users",user.uid));
if(snap.exists()){
const d=snap.data();
if(d.bio) bio.innerText=d.bio;
if(d.pfpBase64) pfp.src=d.pfpBase64;
if(d.coverBase64) coverImg.src=d.coverBase64;
}

/* POSTS */
const q=query(collection(db,"posts"),where("email","==",user.email),orderBy("time","desc"));
onSnapshot(q,(snap)=>{
postList.innerHTML="";
posts.innerText=snap.size;

snap.forEach(doc=>{
const p=doc.data();
postList.innerHTML+=`
<div class="post">
<small>${p.time?.toDate().toLocaleString()}</small>
<div>${p.text}</div>
</div>
`;
});
});
});

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth);
</script>

</body>
</html>
