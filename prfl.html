<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatPH | Professional Feed</title>
    <link rel="icon" type="image/png" href="image/chatph-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0e14;
            --bg-card: #151921;
            --bg-header: rgba(18, 20, 26, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* --- LAYOUT --- */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 64px;
            background: var(--bg-header);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .main-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* --- COMPONENTS --- */
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-size: 1.2rem;
        }

        .logo img { width: 32px; height: 32px; border-radius: 8px; }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 80px 16px 20px;
            transition: var(--transition);
            z-index: 999;
        }

        .sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-secondary);
            border-radius: 10px;
            margin-bottom: 4px;
            transition: var(--transition);
        }

        .sidebar a:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }

        /* --- POST COMPONENT --- */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .create-post { border: 1px solid var(--accent); background: rgba(59, 130, 246, 0.03); }

        .editor {
            width: 100%;
            min-height: 100px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            color: var(--text-primary);
            outline: none;
            font-size: 15px;
        }

        .editor:focus { border-color: var(--accent); }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 99px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }

        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        
        .avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }

        .username { font-weight: 600; font-size: 15px; }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            margin-left: 6px;
        }

        .badge-admin { background: #fbbf24; color: #000; }

        .post-content { font-size: 15px; color: #e2e8f0; line-height: 1.6; }

        .post-actions {
            display: flex;
            gap: 24px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .action-link {
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .action-link:hover { color: var(--accent); }

        /* --- TOAST & UTILS --- */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 24px;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: var(--transition);
            z-index: 9999;
        }

        .toast.show { transform: translateY(0); opacity: 1; }

        /* Marquee Professional Refresh */
        .marquee { background: #1e293b; padding: 8px 0; font-size: 13px; color: var(--accent); }

        @keyframes scrollAds {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .marquee-track {
            display: inline-block;
            white-space: nowrap;
            animation: scrollAds 30s linear infinite;
        }
        
    </style>
    
</head>
<body>

<header>
    <div class="logo">
        <div style="cursor:pointer" onclick="toggleMenu()">☰</div>
        <img src="image/chatph-logo.png" alt="Logo">
        <span>ChatPH</span>
    </div>
    <div style="display:flex; align-items:center; gap:16px;">
        <span id="userDisplay" style="font-size:14px; color:var(--text-secondary)">Loading...</span>
        <img id="logoutBtn" src="image/icon/logout.png" style="width:20px; cursor:pointer; display:none;">
    </div>
</header>

<nav class="sidebar" id="sidebar">
    <a href="home.html">🏠 Home</a>
    <a href="msg.html">💬 Messages</a>
    <a href="frnd.html">👥 Friends</a>
    <a href="prfl.html">👤 Profile</a>
</nav>

<div class="marquee">
    <div class="marquee-track">
        🚀 Elevate your business with ChatPH Ads &nbsp;&nbsp; • &nbsp;&nbsp; 
        ✨ Professional networking reimagined &nbsp;&nbsp; • &nbsp;&nbsp; 
        🔒 Secure & Encrypted Conversations
    </div>
</div>

<main class="main-container">
    <div class="card create-post">
        <div id="postText" class="editor" contenteditable="true" data-placeholder="What's on your mind?"></div>
        <div style="display:flex; justify-content: flex-end; margin-top:12px;">
            <button class="btn-primary" onclick="createPost()">Post</button>
        </div>
    </div>

    <div id="postsFeed">
        </div>
</main>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyB0A7O_FkTbekDZgjjn6wGVIPKdJ1nkq9E",
    authDomain: "chatph-cc187.firebaseapp.com",
    projectId: "chatph-cc187",
    storageBucket: "chatph-cc187.firebasestorage.app",
    messagingSenderId: "324012163441",
    appId: "1:324012163441:web:7a54be2231ad2cae71f6d0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
    const userDisplay = document.getElementById("userDisplay");
    const logoutBtn = document.getElementById("logoutBtn");

    if (user) {
        userDisplay.innerText = user.displayName || user.email;
        logoutBtn.style.display = "inline";
    } else {
        // Redirect to login if not logged in
        window.location.href = "index.html"; 
    }
});

window.createPost = async () => {
    const editor = document.getElementById("postText");
    const text = editor.innerText.trim();
    const user = auth.currentUser;

    if (!text) {
        window.showToast("Please write something first!", "error");
        return;
    }

    try {
        await addDoc(collection(db, "posts"), {
            text: text,
            uid: user.uid,
            name: user.displayName || "User",
            photo: user.photoURL || "https://via.placeholder.com/44",
            time: serverTimestamp()
        });
        editor.innerText = ""; // Clear editor
        window.showToast("Post shared successfully!", "success");
    } catch (err) {
        console.error(err);
        window.showToast("Failed to post.", "error");
    }
};

document.getElementById("logoutBtn").onclick = () => signOut(auth);

window.showToast = (msg, type = "info") => {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.className = `toast show ${type}`; // Support different colors
    toast.style.borderLeft = type === "error" ? "4px solid #ef4444" : "4px solid #3b82f6";
    setTimeout(() => toast.classList.remove("show"), 3000);
};

window.toggleMenu = () => document.getElementById("sidebar").classList.toggle("open");

document.addEventListener('click', (e) => {
    const sidebar = document.getElementById('sidebar');
    if (!sidebar.contains(e.target) && !e.target.closest('.logo')) {
        sidebar.classList.remove('open');
    }
});

</script>
</body>
</html>
