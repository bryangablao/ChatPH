<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | ChatPH</title>
    <link rel="icon" type="image/png" href="image/chatph-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1115;
            --card: #171a21;
            --border: #23262f;
            --text: #ffffff;
            --accent: #4da3ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* SHARED HEADER & SIDEBAR STYLES */
        header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: #12141a; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo img { width: 32px; }
        .logo span { font-weight: 700; font-size: 18px; }
        .hamburger { font-size: 22px; cursor: pointer; }
        .sidebar { position: fixed; top: 0; left: -230px; width: 230px; height: 100%; background: #14171d; border-right: 1px solid var(--border); padding-top: 70px; transition: .3s; z-index: 1001; }
        .sidebar.open { left: 0; }
        .sidebar a { display: flex; align-items: center; gap: 12px; padding: 14px 20px; text-decoration: none; color: white; font-weight: 500; transition: .2s; }
        .sidebar a:hover { background: #1e222b; }
        .logout-icon { width: 22px; cursor: pointer; }

        /* PROFILE SPECIFIC DESIGN */
        .profile-header {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .cover-photo {
            height: 200px;
            background: linear-gradient(45deg, #1e222b, #4da3ff44);
            border-bottom: 1px solid var(--border);
            border-radius: 0 0 20px 20px;
        }

        .profile-card {
            max-width: 600px;
            margin: -60px auto 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid var(--bg);
            margin-top: -80px;
            background: var(--card);
            object-fit: cover;
        }

        .user-info h2 { margin: 10px 0 5px; font-size: 24px; }
        .user-info p { opacity: 0.6; font-size: 14px; margin-bottom: 15px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .stat-box b { display: block; font-size: 18px; color: var(--accent); }
        .stat-box span { font-size: 12px; opacity: 0.7; }

        .bio-section {
            background: var(--glass);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.5;
            min-height: 40px;
            position: relative;
        }

        /* REUSING POST STYLES */
        .main-feed { max-width: 520px; margin: 20px auto; padding: 0 16px; }
        .section-label { font-weight: 700; margin-bottom: 15px; color: var(--accent); display: block; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }

        .post {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 15px;
        }

        .edit-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* BADGES */
        .admin-badge { background: #ffd700; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 800; vertical-align: middle; }
        
        footer { text-align: center; padding: 40px 20px; opacity: 0.5; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <img src="image/chatph-logo.png">
        <span>ChatPH</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
        <span id="userDisplay">Guest</span>
        <img id="logoutBtn" src="image/icon/logout.png" class="logout-icon" style="display:none;">
    </div>
</header>

<div class="sidebar" id="sidebar">
    <a href="home.html"><span>🏠</span> Home</a>
    <a href="msg.html"><span>💬</span> Messages</a>
    <a href="frnd.html"><span>👥</span> Friends</a>
    <a href="srch.html"><span>🔎</span> Search User</a>
    <a href="prfl.html"><span>👤</span> Profile</a>
</div>

<div class="profile-header">
    <div class="cover-photo"></div>
    <div class="profile-card">
        <img id="pfp" class="profile-avatar" src="https://cdn-icons-png.flaticon.com/512/3177/3177440.png">
        <div class="user-info">
            <h2 id="nameDisplay">User Name <span id="badgeLoc"></span></h2>
            <p id="emailDisplay">user@example.com</p>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><b id="postCount">0</b><span>Posts</span></div>
            <div class="stat-box"><b>0</b><span>Friends</span></div>
            <div class="stat-box"><b>2026</b><span>Joined</span></div>
        </div>

        <div class="bio-section" id="bioDisplay">
            No bio yet. Click edit to tell the world about yourself!
        </div>
        <button class="edit-btn" onclick="editBio()">Edit Profile</button>
    </div>
</div>

<div class="main-feed">
    <span class="section-label">My Recent Activity</span>
    <div id="userPosts">
        </div>
</div>

<footer>
    © 2026 ChatPH • All Rights Reserved
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB0A7O_FkTbekDZgjjn6wGVIPKdJ1nkq9E",
        authDomain: "chatph-cc187.firebaseapp.com",
        projectId: "chatph-cc187",
        storageBucket: "chatph-cc187.firebasestorage.app",
        messagingSenderId: "324012163441",
        appId: "1:324012163441:web:7a54be2231ad2cae71f6d0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    /* UI TOGGLES */
    window.toggleMenu = () => document.getElementById("sidebar").classList.toggle("open");

    /* BADGE LOGIC (Matching your home.html) */
    function getBadge(email){
        if(email === "ablaobryan4400@gmail.com") return `<span class="admin-badge">💠 Admin</span>`;
        return "";
    }

    /* AUTH & DATA LOADING */
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById("userDisplay").innerText = user.displayName || "User";
            document.getElementById("logoutBtn").style.display = "inline";
            
            // Fill Profile Card
            document.getElementById("nameDisplay").firstChild.textContent = user.displayName || "User";
            document.getElementById("emailDisplay").innerText = user.email;
            document.getElementById("pfp").src = user.photoURL || "https://cdn-icons-png.flaticon.com/512/3177/3177440.png";
            document.getElementById("badgeLoc").innerHTML = getBadge(user.email);

            loadUserBio(user.uid);
            loadUserPosts(user.email);
        } else {
            window.location.href = "index.html";
        }
    });

    /* LOAD BIO FROM FIRESTORE */
    async function loadUserBio(uid) {
        const userRef = doc(db, "users", uid);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists() && userSnap.data().bio) {
            document.getElementById("bioDisplay").innerText = userSnap.data().bio;
        }
    }

    /* EDIT BIO FUNCTION */
    window.editBio = async () => {
        const currentBio = document.getElementById("bioDisplay").innerText;
        const newBio = prompt("Enter your new bio:", currentBio);
        if (newBio !== null) {
            const user = auth.currentUser;
            await setDoc(doc(db, "users", user.uid), { bio: newBio }, { merge: true });
            document.getElementById("bioDisplay").innerText = newBio;
        }
    };

    /* LOAD ONLY THIS USER'S POSTS */
    function loadUserPosts(email) {
        const q = query(collection(db, "posts"), where("email", "==", email), orderBy("time", "desc"));
        const postContainer = document.getElementById("userPosts");

        onSnapshot(q, (snapshot) => {
            postContainer.innerHTML = "";
            document.getElementById("postCount").innerText = snapshot.size;

            if(snapshot.empty) {
                postContainer.innerHTML = "<p style='text-align:center; opacity:0.5;'>You haven't posted anything yet.</p>";
            }

            snapshot.forEach((postDoc) => {
                const p = postDoc.data();
                postContainer.innerHTML += `
                    <div class="post">
                        <div style="font-size:12px; opacity:0.5; margin-bottom:8px;">
                            ${p.time?.toDate().toLocaleDateString()}
                        </div>
                        <div style="line-height:1.4;">${p.text}</div>
                    </div>
                `;
            });
        });
    }

    /* LOGOUT */
    document.getElementById("logoutBtn").onclick = async () => {
        await signOut(auth);
        window.location.href = "index.html";
    };
</script>
</body>
</html>
