<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChatPH | Building</title>
<link rel="icon" type="image/png" href="image/chatph-logo.png">
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
/* Remove all scrolling and fix height */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; /* Strict no-scroll */
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, #0f1115, #141821);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between; /* Spreads content: top, middle, bottom */
}

.back-btn {
    position: absolute;
    top: 15px;
    left: 15px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.05);
    color: white;
    font-size: 12px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    z-index: 10;
}

.container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 90%;
    max-width: 400px;
}

/* Scalable Animation */
lottie-player {
    width: 50vh; /* Scaled based on screen height to prevent pushing text off */
    max-width: 240px;
    height: auto;
    margin: 0 auto;
}

h1 {
    font-size: clamp(20px, 5vh, 26px); /* Scales based on height */
    margin: 10px 0 5px 0;
}

p {
    opacity: .7;
    font-size: clamp(13px, 4vh, 15px);
    margin: 0;
    line-height: 1.4;
}

.note {
    margin-top: 12px;
    font-size: 13px;
    color: #4da3ff;
    font-weight: 600;
    min-height: 1.2em; /* Prevents layout jump when text changes */
}

/* Fixed Footer at the very bottom */
footer {
    padding-bottom: 20px;
    width: 100%;
    text-align: center;
}

footer div {
    font-size: 12px;
    opacity: 0.6;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.container { animation: fadeIn 0.8s ease; }
</style>
</head>

<body>
<button class="back-btn" onclick="goBack()">← Back</button>

<div class="container">
    <lottie-player
        src="https://assets10.lottiefiles.com/packages/lf20_jtbfg2nb.json"
        background="transparent"
        speed="1"
        loop
        autoplay>
    </lottie-player>

    <h1>🚧 Building...</h1>
    <p>We’re crafting something new for you.<br>Stay tuned!</p>

    <div class="note">Coming soon on ChatPH 👀</div>
</div>

<footer>
    <div>© 2026 ChatPH • All Rights Reserved</div>
    <div style="margin-top:4px; font-size:11px; opacity:0.5;">
        Made with ❤️ in the Philippines
    </div>
</footer>

<script>
const messages = [
    "Building something awesome...",
    "Almost ready...",
    "Stay tuned 🚀",
    "New features coming soon 👀",
    "Polishing the code..."
];

setInterval(() => {
    const noteEl = document.querySelector(".note");
    noteEl.innerText = messages[Math.floor(Math.random() * messages.length)];
}, 3000);

function goBack() {
    if (document.referrer) {
        history.back();
    } else {
        window.location.href = "home.html"; 
    }
}
</script>
</body>
</html>
