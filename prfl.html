<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | ChatPH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f1115;
--card:#171a21;
--border:#23262f;
--text:#ffffff;
--accent:#4da3ff;
--glass:rgba(255,255,255,0.04);
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
background:#12141a;
border-bottom:1px solid var(--border);
}

.logo{display:flex;gap:10px;align-items:center;}
.logo img{width:32px;}
.hamburger{cursor:pointer;font-size:22px;}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-230px;
width:230px;
height:100%;
background:#14171d;
padding-top:70px;
transition:.3s;
}
.sidebar.open{left:0;}
.sidebar a{
display:block;
padding:14px 20px;
color:white;
text-decoration:none;
}
.sidebar a:hover{background:#1e222b;}

/* COVER */
.cover{
height:220px;
background:linear-gradient(120deg,#4da3ff33,#2563eb55);
border-bottom:1px solid var(--border);
}

/* PROFILE CARD */
.profile-card{
max-width:600px;
margin:-70px auto 20px;
background:var(--glass);
backdrop-filter:blur(12px);
border:1px solid var(--border);
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.5);
}

/* AVATAR */
.avatar-wrap{
position:relative;
display:inline-block;
}

.profile-avatar{
width:120px;
height:120px;
border-radius:50%;
border:5px solid var(--bg);
object-fit:cover;
}

/* ONLINE DOT */
.online{
position:absolute;
bottom:10px;
right:10px;
width:16px;
height:16px;
background:#22c55e;
border-radius:50%;
border:3px solid var(--bg);
}

/* NAME */
.name{
font-size:24px;
font-weight:700;
margin-top:10px;
}

.email{
opacity:.6;
font-size:13px;
}

/* STATS */
.stats{
display:flex;
justify-content:space-around;
margin-top:20px;
padding:15px 0;
border-top:1px solid var(--border);
border-bottom:1px solid var(--border);
}

.stat b{
display:block;
font-size:18px;
color:var(--accent);
}

.stat span{
font-size:12px;
opacity:.7;
}

/* BIO */
.bio{
background:var(--glass);
padding:12px;
border-radius:10px;
margin-top:15px;
font-size:14px;
}

/* BUTTON */
.edit-btn{
margin-top:12px;
padding:8px 18px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#4da3ff,#2563eb);
color:black;
font-weight:700;
cursor:pointer;
transition:.2s;
}
.edit-btn:hover{
transform:scale(1.05);
}

/* POSTS */
.feed{
max-width:520px;
margin:auto;
padding:16px;
}

.post{
background:var(--card);
padding:14px;
border-radius:12px;
margin-bottom:12px;
border:1px solid var(--border);
transition:.2s;
}
.post:hover{
transform:translateY(-3px);
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
opacity:.5;
}
</style>
</head>

<body>

<header>
<div class="logo">
<div class="hamburger" onclick="toggleMenu()">☰</div>
<span>ChatPH</span>
</div>

<div>
<span id="userDisplay"></span>
<img id="logoutBtn" src="image/icon/logout.png" style="width:22px;cursor:pointer;display:none;">
</div>
</header>

<div class="sidebar" id="sidebar">
<a href="home.html">🏠 Home</a>
<a href="msg.html">💬 Messages</a>
<a href="frnd.html">👥 Friends</a>
<a href="prfl.html">👤 Profile</a>
</div>

<div class="cover"></div>

<div class="profile-card">

<div class="avatar-wrap">
<img id="pfp" class="profile-avatar">
<div class="online"></div>
</div>

<div class="name" id="name"></div>
<div class="email" id="email"></div>

<div class="stats">
<div class="stat"><b id="posts">0</b><span>Posts</span></div>
<div class="stat"><b>0</b><span>Friends</span></div>
<div class="stat"><b>2026</b><span>Joined</span></div>
</div>

<div class="bio" id="bio">No bio yet...</div>

<button class="edit-btn" onclick="editBio()">Edit Profile</button>

</div>

<div class="feed" id="feed"></div>

<footer>© 2026 ChatPH</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
apiKey:"AIza...",
authDomain:"chatph-cc187.firebaseapp.com",
projectId:"chatph-cc187"
});

const db = getFirestore(app);
const auth = getAuth(app);

window.toggleMenu=()=>{
document.getElementById("sidebar").classList.toggle("open");
};

/* AUTH */
onAuthStateChanged(auth, async user=>{
if(!user) location.href="index.html";

document.getElementById("userDisplay").innerText=user.displayName;
document.getElementById("logoutBtn").style.display="inline";

document.getElementById("name").innerText=user.displayName;
document.getElementById("email").innerText=user.email;
document.getElementById("pfp").src=user.photoURL || "https://cdn-icons-png.flaticon.com/512/3177/3177440.png";

loadBio(user.uid);
loadPosts(user.email);
});

/* BIO */
async function loadBio(uid){
const snap = await getDoc(doc(db,"users",uid));
if(snap.exists()) document.getElementById("bio").innerText=snap.data().bio || "No bio yet...";
}

window.editBio = async ()=>{
const user=auth.currentUser;
const bio = prompt("Edit bio:");
if(bio){
await setDoc(doc(db,"users",user.uid),{bio},{merge:true});
document.getElementById("bio").innerText=bio;
}
};

/* POSTS */
function loadPosts(email){
const q = query(collection(db,"posts"),where("email","==",email),orderBy("time","desc"));

onSnapshot(q,snap=>{
document.getElementById("posts").innerText=snap.size;

let html="";
snap.forEach(doc=>{
const p=doc.data();
html+=`
<div class="post">
<div style="opacity:.5;font-size:12px;margin-bottom:6px;">
${p.time?.toDate().toLocaleDateString()}
</div>
${p.text}
</div>`;
});

document.getElementById("feed").innerHTML=html || "No posts yet";
});
}

/* LOGOUT */
logoutBtn.onclick=()=>{signOut(auth);};
</script>

</body>
</html>
