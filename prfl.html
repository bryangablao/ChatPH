<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | ChatPH</title>
    <link rel="icon" type="image/png" href="image/chatph-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e11;
            --card: #151921;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
            --gradient: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%);
        }

        * { box-sizing: border-box; transition: all 0.2s ease-in-out; }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* HEADER & SIDEBAR */
        header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 24px; height: 70px; background: rgba(11, 14, 17, 0.9); 
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 1000; 
        }
        
        .sidebar { 
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%; 
            background: var(--card); border-right: 1px solid var(--border); 
            padding-top: 80px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; 
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); visibility: hidden; opacity: 0; z-index: 1999;
        }
        .sidebar-overlay.active { visibility: visible; opacity: 1; }

        /* PROFILE LAYOUT */
        .cover-wrapper {
            position: relative; height: 220px; width: 100%;
            background: #1e293b; overflow: hidden;
        }
        #coverImg { width: 100%; height: 100%; object-fit: cover; }
        
        .edit-cover-btn {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(0,0,0,0.6); color: white; border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px;
        }

        .profile-card {
            max-width: 800px; margin: -60px auto 30px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 30px; text-align: center;
            position: relative; z-index: 5;
        }

        .pfp-wrapper { position: relative; width: 130px; height: 130px; margin: -90px auto 15px; }
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--card); object-fit: cover; }
        .pfp-edit-overlay { 
            position: absolute; bottom: 5px; right: 5px; background: var(--accent); 
            width: 35px; height: 35px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; cursor: pointer; border: 3px solid var(--card);
        }

        .stats-row { display: flex; justify-content: center; gap: 40px; margin: 20px 0; border-top: 1px solid var(--border); padding-top: 20px; }
        .stat-item b { display: block; font-size: 18px; }
        .stat-item span { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }

        /* CUSTOM MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal {
            background: var(--card); border: 1px solid var(--border);
            padding: 25px; border-radius: 20px; width: 90%; max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .modal textarea {
            width: 100%; height: 100px; background: #0b0e11; border: 1px solid var(--border);
            color: white; border-radius: 10px; padding: 10px; margin: 15px 0; font-family: inherit;
        }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; }

        /* POSTS */
        .post-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: left; }
        
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; color: var(--text-dim); }

        #loadingToast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 10px 20px;
            border-radius: 30px; display: none; z-index: 9999;
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
<div id="loadingToast">Uploading... Please wait</div>

<div class="modal-overlay" id="bioModal">
    <div class="modal">
        <h3>Update Bio</h3>
        <textarea id="bioInput" placeholder="Tell us about yourself..."></textarea>
        <div class="modal-btns">
            <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
            <button class="btn btn-primary" onclick="saveBio()">Save Changes</button>
        </div>
    </div>
</div>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <div onclick="toggleMenu()" style="cursor:pointer; font-size: 24px;">☰</div>
        <span style="font-weight: 700; font-size: 18px;">ChatPH</span>
    </div>
    <div id="logoutBtn" style="color: #ef4444; font-size: 14px; cursor: pointer; font-weight: 600;">Logout</div>
</header>

<div class="sidebar" id="sidebar">
    <a href="home.html" style="display:block; padding: 15px 25px; text-decoration: none; color: white;">🏠 Home</a>
    <a href="prfl.html" style="display:block; padding: 15px 25px; text-decoration: none; color: var(--accent);">👤 Profile</a>
</div>

<input type="file" id="pfpInput" hidden accept="image/*">
<input type="file" id="coverInput" hidden accept="image/*">

<div class="profile-container">
    <div class="cover-wrapper">
        <button class="edit-cover-btn" onclick="document.getElementById('coverInput').click()">📷 Change Cover</button>
        <img id="coverImg" src="https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2000">
    </div>

    <div class="profile-card">
        <div class="pfp-wrapper">
            <img id="pfp" class="profile-avatar" src="https://cdn-icons-png.flaticon.com/512/3177/3177440.png">
            <div class="pfp-edit-overlay" onclick="document.getElementById('pfpInput').click()">✏️</div>
        </div>

        <h2 id="nameDisplay">User Name <span id="badgeLoc"></span></h2>
        <p id="emailDisplay" style="color: var(--text-dim); margin-top: -10px;">loading...</p>

        <div class="stats-row">
            <div class="stat-item"><b id="postCount">0</b><span>Posts</span></div>
            <div class="stat-item"><b>0</b><span>Friends</span></div>
            <div class="stat-item"><b>2026</b><span>Joined</span></div>
        </div>

        <div id="bioDisplay" style="background: var(--glass); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
            Getting your bio...
        </div>

        <button class="btn btn-primary" onclick="openBioModal()">Edit Profile</button>
    </div>

    <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <h4 style="color: var(--accent); text-transform: uppercase; letter-spacing: 1px;">Recent Activity</h4>
        <div id="userPosts"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB0A7O_FkTbekDZgjjn6wGVIPKdJ1nkq9E",
        authDomain: "chatph-cc187.firebaseapp.com",
        projectId: "chatph-cc187",
        storageBucket: "chatph-cc187.firebasestorage.app",
        messagingSenderId: "324012163441",
        appId: "1:324012163441:web:7a54be2231ad2cae71f6d0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);

    // Sidebar Toggle
    window.toggleMenu = () => {
        const sb = document.getElementById("sidebar");
        const ov = document.getElementById("overlay");
        sb.classList.toggle("open");
        ov.classList.toggle("active");
    };

    // Modal Controls
    window.openBioModal = () => {
        document.getElementById("bioModal").style.display = "flex";
        document.getElementById("bioInput").value = document.getElementById("bioDisplay").innerText;
    };
    window.closeModals = () => {
        document.getElementById("bioModal").style.display = "none";
    };

    // Auth State
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById("nameDisplay").firstChild.textContent = user.displayName || "User";
            document.getElementById("emailDisplay").innerText = user.email;
            loadUserData(user);
            loadUserPosts(user.email);
        } else {
            window.location.href = "index.html";
        }
    });

    // Load User Data
    async function loadUserData(user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById("bioDisplay").innerText = data.bio || "No bio yet. Tap 'Edit Profile' to add one!";
            if (data.pfpURL) document.getElementById("pfp").src = data.pfpURL;
            if (data.coverURL) document.getElementById("coverImg").src = data.coverURL;
        } else {
            document.getElementById("bioDisplay").innerText = "Welcome! Tap 'Edit Profile' to add a bio.";
        }
    }

    // Save Bio
    window.saveBio = async () => {
        const text = document.getElementById("bioInput").value;
        const user = auth.currentUser;
        await setDoc(doc(db, "users", user.uid), { bio: text }, { merge: true });
        document.getElementById("bioDisplay").innerText = text;
        closeModals();
    };

    // Handle File Uploads (Storage)
    const uploadFile = async (file, type) => {
        if (!file) return;
        const user = auth.currentUser;
        const toast = document.getElementById("loadingToast");
        toast.style.display = "block";

        try {
            const storageRef = ref(storage, `users/${user.uid}/${type}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            
            await setDoc(doc(db, "users", user.uid), { [type === 'pfp' ? 'pfpURL' : 'coverURL']: url }, { merge: true });
            document.getElementById(type === 'pfp' ? "pfp" : "coverImg").src = url;
        } catch (e) {
            console.error(e);
            alert("Upload failed. Make sure your Firebase Storage rules allow uploads.");
        }
        toast.style.display = "none";
    };

    document.getElementById("pfpInput").onchange = (e) => uploadFile(e.target.files[0], 'pfp');
    document.getElementById("coverInput").onchange = (e) => uploadFile(e.target.files[0], 'cover');

    // Posts
    function loadUserPosts(email) {
        const q = query(collection(db, "posts"), where("email", "==", email), orderBy("time", "desc"));
        onSnapshot(q, (snapshot) => {
            const cont = document.getElementById("userPosts");
            cont.innerHTML = "";
            document.getElementById("postCount").innerText = snapshot.size;
            snapshot.forEach(d => {
                const p = d.data();
                cont.innerHTML += `<div class="post-card">${p.text}</div>`;
            });
        });
    }

    document.getElementById("logoutBtn").onclick = () => signOut(auth);
</script>
</body>
</html>
