<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatPH | Search Users</title>

<link rel="icon" type="image/png" href="image/chatph-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f1115;
--card:#171a21;
--border:#23262f;
--text:#ffffff;
--accent:#4da3ff;
--dim:#9ca3af;
}
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg); 
    color:var(--text);
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 24px;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:100;
}

.header-left{
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
}

.menu-icon{
font-size:26px;
}

.logo{
width:32px;
border-radius:6px;
}

.brand{
font-weight:700;
}

/* SIDEBAR */
.sidebar{
    display:flex;
    flex-direction:column;
    position: fixed;
    top: 0;
    left: -260px;
    width: 240px;
    height: 100%;
    background: rgba(21,25,33,0.75);
    backdrop-filter: blur(12px);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding-top: 70px;
    transition: .3s;
    z-index: 999;
    overflow-y: auto;
}
.sidebar.open{
    left:0;
}
.sidebar a {
    display:block;
    padding:14px 20px;
    text-decoration:none;
    color:white;
    position: relative;
    overflow: hidden;
    z-index: 1;
}
.sidebar a::before {
    content: "";
    position: absolute;
    left: -100%;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(59,130,246,0.1);
    transition: left 0.25s ease;
    z-index: 0;
}
.sidebar a:hover::before {
    left: 0;
}
.sidebar a:hover {
    background: rgba(255,255,255,0.05);
    color: var(--accent);
}
.sidebar a.active {
    background: rgba(59,130,246,0.15);
    color: var(--accent);
    border-left: 3px solid var(--accent);
}

/* INDICATOR */
.indicator {
    position: absolute;
    left: 0;
    width: 4px;
    height: 44px;
    background: var(--accent);
    border-radius: 4px;
    top: 0;
    transition: 0.3s ease;
    box-shadow: 0 0 10px rgba(59,130,246,0.7);
    z-index: 0;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
opacity:0;
pointer-events:none;
transition:.3s;
z-index: 998;
}
.overlay.active{
opacity:1;
pointer-events:auto;
}

/* MAIN */
.main{
    max-width:300px;
    margin:auto;
    padding:16px;
    width:100%;
    position:relative;
    z-index:1;
}

.main-bg{
    flex:1;
    width:100%;
    background: url('image/wallpaper/ChatPHwallpaper.png') center center / cover no-repeat;
    display:flex;
    justify-content:center;
    position:relative; /* مهم */
}

/* 🔥 overlay layer */
.main-bg::before{
    content:"";
    position:absolute;
    inset:0;
    background: rgba(0,0,0,0.55); /* adjust 0.3 - 0.7 */
    z-index:0;
}

.main.centered .search-box{
width:100%;
max-width:650px;
padding:25px
border-radius:16px;
}

.main.centered input{
padding:16px; /* bigger input */
font-size:16px;
}

/* SEARCH BOX */
.search-box{
background:var(--card);
padding:15px;
border-radius:12px;
border:1px solid var(--border);
margin-bottom:15px;
}

.search-box input{
width:100%;
padding:12px;
padding-right:40px;
box-sizing:border-box;
border-radius:10px;
border:none;
outline:none;
background:#0f1115;
color:white;
}

/* STATS */
.stats{
margin-top:10px;
font-size:14px;
opacity:.8;
}

/* USER CARD */
.user-card{
background:var(--card);
border:1px solid var(--border);
padding:12px;
border-radius:12px;
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
cursor:pointer;
transition:.2s;
}

.user-card:hover{
background:#1f2937;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
}

.username{
font-weight:600;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    backdrop-filter: blur(8px); /* ✅ BLUR BACKGROUND */
    background: rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.popup-content{
    background:#171a21;
    padding:14px;   /* smaller */
    border-radius:12px;
    width:240px;    /* tighter */
}

.popup-row{
    display:flex;
    gap:12px;
    align-items:center;
}

.popup-right{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    justify-content:center;
}

/* profile image ONLY */
#popupImg{
    width:55px;
    height:55px;
    border-radius:50%;
}

/* action buttons */
.popup-actions img{
    width:22px;
    height:22px;
    padding:0;
    background:none;
    border-radius:0;
    cursor:pointer;
}

.popup-name{
    font-weight:600;
    margin-bottom:10px;
}

.popup-actions{
    display:flex;
    gap:8px;
    margin-top:6px;
    align-items:center; /* ✅ center fix */
}

.popup-actions img:hover{
    transform:scale(1.1);
    background:#374151;
}

.btn{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:var(--accent);
color:black;
cursor:pointer;
}

.popup-content.modern{
    width:280px; /* smaller */
    padding:16px;
    border-radius:12px;
}

.user-info{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}
.user-info img{
    width:50px;
    height:50px;
}
.user-info h3{
    font-size:16px;
}

.action-buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:10px;
}

.action-buttons img{
    width:32px;
    height:32px;
    padding:0; /* ❌ remove padding */
    background:none; /* ❌ remove black background */
    border-radius:0; /* ❌ remove box */
    cursor:pointer;
    transition:.2s;
}

.action-buttons img:hover{
    transform:scale(1.2);
}

/* FOOTER */
footer{
    text-align:center;
    padding:10px;
    font-size:13px;
    opacity:.6;
    background:var(--bg);
}
    
footer a:hover{
text-decoration:underline;
}
    
.main.centered{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
flex-direction:column;
}

.search-box.active{
position:sticky;
top:10px;
transform:scale(.95);
transition:.3s;
}

.search-box{
position:relative;
}

::-webkit-scrollbar{
width:8px;
}
::-webkit-scrollbar-track{
background:#0f1115;
}
::-webkit-scrollbar-thumb{
background:#2a2f3b;
border-radius:10px;
}
::-webkit-scrollbar-thumb:hover{
background:#4da3ff;
}
    
#clearBtn{
position:absolute;
right:30px;
top:35%;
transform:translateY(-50%);
cursor:pointer;
display:none;
font-size:14px;
}
    
#logoutBtn { cursor: pointer; color: var(--dim); font-weight: 600; font-size: 14px; }
#logoutBtn:hover { color: #ff4b4b; }

#userDisplay:hover{
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
}

.top-links{
    display:flex;
    flex-direction:column;
}

.bottom-link{
    margin-top:auto;
}
    
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="header-left">
<span class="menu-icon" onclick="toggleSidebar()">☰</span>

<div onclick="window.location.href='home.html'" style="display:flex;align-items:center;gap:12px;cursor:pointer;">

</div>

    Guest

<div class="sidebar" id="sidebar">

<div class="main-bg">

Total Registered Accounts: <span id="totalUsers">0</span> |
Online: <span id="onlineUsers">0</span>

</div>
</div>

<div class="popup" id="popup">

                <img id="friendBtn" onclick="handleFriendAction()">
                <img src="image/icon/directmessage.png" title="Message" onclick="startChat()">

<footer style="

">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
getDoc,
doc,
setDoc,
updateDoc,
onSnapshot,
addDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyB0A7O_FkTbekDZgjjn6wGVIPKdJ1nkq9E",
authDomain: "chatph-cc187.firebaseapp.com",
projectId: "chatph-cc187"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* SIDEBAR */
window.toggleSidebar = (close=false)=>{
    const s = document.getElementById("sidebar");
    const o = document.getElementById("overlay");

    if(close){
        s.classList.remove("open");
        o.classList.remove("active");
    }else{
        const isOpen = s.classList.contains("open");

        if(isOpen){
            s.classList.remove("open");
            o.classList.remove("active");
        }else{
            s.classList.add("open");
            o.classList.add("active");
        }
    }
};

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
if(user){

document.getElementById("userDisplay").innerText =
user.displayName || user.email;

// 🟢 SET ONLINE
await setDoc(doc(db,"status",user.uid),{
    lastSeen:new Date()
});

// 🔁 UPDATE LAST SEEN EVERY 10 SECONDS
setInterval(async ()=>{
    await updateDoc(doc(db,"status",user.uid),{
        lastSeen:new Date()
    });
}, 10000);

// 🔴 OFFLINE WHEN TAB CLOSE
window.addEventListener("beforeunload", async ()=>{
await updateDoc(doc(db,"status",user.uid),{
    lastSeen:new Date()
});
});

}else{
window.location.href="index.html";
}
});

  document.getElementById("logoutBtn").onclick = async ()=>{
await signOut(auth);
window.location.href="index.html";
};

/* LOAD USERS */
let users = [];
let avatarUnsubs = [];
let popupUnsub = null;

async function loadUsers(){
const snap = await getDocs(collection(db,"users"));
users = [];

for (const docSnap of snap.docs){
    const userData = {id:docSnap.id,...docSnap.data()};
    users.push(userData);

    // ✅ CREATE STATUS IF MISSING
    const statusRef = doc(db,"status",docSnap.id);
    const statusSnap = await getDoc(statusRef);

if(!statusSnap.exists()){
    await setDoc(statusRef,{
        lastSeen:new Date()
    });
}
}

document.getElementById("totalUsers").innerText = users.length;
renderUsers([]);
}

loadUsers();

function listenOnlineUsers(){
const statusRef = collection(db,"status");

onSnapshot(statusRef,(snap)=>{
let online = 0;

snap.forEach(doc=>{
    const data = doc.data();
    const lastSeen = data.lastSeen?.toDate();
    const now = new Date();

    if(lastSeen && (now - lastSeen < 15000)){
        online++;
    }
});

document.getElementById("onlineUsers").innerText = online;
});
}

listenOnlineUsers();

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", e=>{
const val = e.target.value.toLowerCase();

const main = document.querySelector(".main");
const searchBox = document.querySelector(".search-box");

if(val){
    main.classList.remove("centered");
    searchBox.classList.add("active");
}else{
    main.classList.add("centered");
    searchBox.classList.remove("active");
    renderUsers([]);
    return;
}

const filtered = users.filter(u =>
((u.firstName || "") + " " + (u.lastName || ""))
.toLowerCase()
.includes(val)
);

renderUsers(filtered);
});

function timeAgo(date){
    const now = new Date();
    const seconds = Math.floor((now - date) / 1000);

    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(seconds / 3600);
    const days = Math.floor(seconds / 86400);

    if(seconds < 60) return "just now";
    if(minutes < 60) return minutes + "m ago";
    if(hours < 24) return hours + "h ago";
    if(days === 1) return "yesterday";
    if(days < 30) return days + "d ago";

    return date.toLocaleDateString();
}
    
/* RENDER */
function renderUsers(list){
const box = document.getElementById("results");

avatarUnsubs.forEach(unsub => unsub());
avatarUnsubs = [];
box.innerHTML = "";

list.forEach(u=>{
box.innerHTML += `
<div class="user-card" onclick='openUser(${JSON.stringify(u.id)},${JSON.stringify(u.firstName + " " + u.lastName)})'>
<img id="avatar-${u.id}" class="avatar" 
     src="https://cdn-icons-png.flaticon.com/512/3177/3177440.png">
<div>
<div class="username">
${(u.firstName || "") + " " + (u.lastName || "") || "User"}
</div>
<div style="font-size:12px;color:#9ca3af;" id="status-${u.id}">
● Offline
</div>
</div>
</div>
`;


// ✅ REALTIME AVATAR LISTENER
const userRef = doc(db, "users", u.id);
const unsub = onSnapshot(userRef, (snap) => {
    const data = snap.data();
    const img = document.getElementById("avatar-" + u.id);

    if (img) {
        img.src = data?.pfpBase64 ||
        "https://cdn-icons-png.flaticon.com/512/3177/3177440.png";
    }
});

avatarUnsubs.push(unsub);

// ✅ STATUS LISTENER (keep yours)
const statusRef = doc(db,"status",u.id);
onSnapshot(statusRef,(snap)=>{
    const statusEl = document.getElementById("status-"+u.id);
    if(!snap.exists()){
        statusEl.innerHTML = '<span style="color:#9ca3af;">● Offline</span>';
        return;
    }

    const data = snap.data();
    const lastSeen = data.lastSeen?.toDate();
    const now = new Date();
    const isOnline = lastSeen && (now - lastSeen < 15000);

    if(isOnline){
        statusEl.innerHTML = '<span style="color:#4ade80;">● Online</span>';
    }else{
        const timeText = lastSeen ? timeAgo(lastSeen) : "offline";
        const fullDate = lastSeen ? lastSeen.toLocaleString() : "";

        statusEl.innerHTML = `
        <span style="color:#9ca3af;" title="Last seen: ${fullDate}">
        ● Offline (Last seen ${timeText})
        </span>
        `;
    }
});

});
}

/* POPUP */
window.openUser = async (id,name)=>{
    window.selectedUser = id;

    document.getElementById("popup").style.display="flex";
    document.getElementById("popupName").innerText=name;

    const img = document.getElementById("popupImg");

    // ❌ REMOVE old listener
    if (popupUnsub) popupUnsub();

    const userRef = doc(db, "users", id);

    // ✅ SAVE new listener
    popupUnsub = onSnapshot(userRef, (snap) => {
        const data = snap.data();
        img.src = data?.pfpBase64 ||
        "https://cdn-icons-png.flaticon.com/512/3177/3177440.png";
    });
};

async function updateFriendButton(id){
    const current = auth.currentUser;
    const btn = document.getElementById("friendBtn");

    const friendDoc = await getDoc(doc(db,"friends",current.uid,"list",id));
    const requestDoc = await getDoc(doc(db,"requests",current.uid,"received",id));
    const pendingDoc = await getDoc(doc(db,"pending",current.uid,"sent",id)); // ⭐ NEW

    if(friendDoc.exists()){
        window.friendStatus = "friends";
        btn.src = "image/icon/unfriend.png";
        btn.title = "Unfriend";

    }else if(requestDoc.exists()){
        window.friendStatus = "request";
        btn.src = "image/icon/acceptfriend.png";
        btn.title = "Accept Request";

    }else if(pendingDoc.exists()){ // ⭐ NEW CONDITION
        window.friendStatus = "pending";
        btn.src = "image/icon/cancelrequest.png";
        btn.title = "Cancel Request";

    }else{
        window.friendStatus = "none";
        btn.src = "image/icon/adduser.png";
        btn.title = "Add Friend";
    }
}

window.closePopup = ()=>{
document.getElementById("popup").style.display="none";
};

/* MESSAGE */
window.startChat = ()=>{
if(window.selectedUser){
window.location.href = "msg.html?uid=" + window.selectedUser;
}
};

window.addFriend = async ()=>{
const current = auth.currentUser;
if(!current || !window.selectedUserData){
    showToast("User not ready", false);
    return;
}

const u = window.selectedUserData;

try{
    // 🔍 check if already sent
    const existing = await getDoc(doc(db,"pending",current.uid,"sent",u.id));
    if(existing.exists()){
        showToast("Already sent request");
        return;
    }

    // YOU → pending
await setDoc(doc(db,"pending",current.uid,"sent",u.id),{
    uid: u.id,
    name: u.firstName + " " + u.lastName,
    photo: u.photo,
    createdAt: Date.now()
});

await setDoc(doc(db,"requests",u.id,"received",current.uid),{
    uid: current.uid,
    name: current.displayName || current.email,
    photo: current.photoURL || "",
    createdAt: Date.now()
});

    showToast("Friend request sent ✅");

}catch(err){
    console.error(err);
    showToast("Failed to send request ❌", false);
}
};

const links = document.querySelectorAll(".sidebar a");
const indicator = document.getElementById("indicator");

links.forEach(link => {
    link.onclick = () => {
        links.forEach(l => l.classList.remove("active"));
        link.classList.add("active");

        indicator.style.top = link.offsetTop + "px";
        indicator.style.height = link.offsetHeight + "px";
    };
});

window.addEventListener("load", () => {
    const active = document.querySelector(".sidebar a.active") || links[0];
    indicator.style.top = active.offsetTop + "px";
    indicator.style.height = active.offsetHeight + "px";
});

window.addEventListener("load", ()=>{
document.querySelector(".main").classList.add("centered");
});

const input = document.getElementById("searchInput");
const clearBtn = document.getElementById("clearBtn");

input.addEventListener("input", ()=>{
clearBtn.style.display = input.value ? "block" : "none";
});

clearBtn.onclick = ()=>{
input.value = "";
clearBtn.style.display = "none";
renderUsers([]);

document.querySelector(".main").classList.add("centered");
document.querySelector(".search-box").classList.remove("active");
};

window.viewProfile = ()=>{
if(window.selectedUser){
    window.location.href = "prfl.html?uid=" + window.selectedUser;
}
};

const popup = document.getElementById("popup");

popup.addEventListener("click", (e) => {
    if (e.target === popup) {
        popup.style.display = "none";
    }
});

function showToast(msg, success=true){
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.borderColor = success ? "#4ade80" : "#ff4b4b";
    t.style.opacity = 1;

    setTimeout(()=>{
        t.style.opacity = 0;
    }, 2500);
}

window.handleFriendAction = async ()=>{
    const current = auth.currentUser;
    const uid = window.selectedUser;

    if(!current || !uid) return;

    // ❌ PREVENT SELF ADD
    if(current.uid === uid){
        showToast("You can't add yourself ❌", false);
        return;
    }

    // ✅ ACCEPT FRIEND
if(window.friendStatus === "request"){

    // ✅ add to friends (same as yours)
    await setDoc(doc(db,"friends",current.uid,"list",uid),{
        uid,
        createdAt:new Date()
    });

    await setDoc(doc(db,"friends",uid,"list",current.uid),{
        uid:current.uid,
        createdAt:new Date()
    });

    await deleteDoc(doc(db,"requests",current.uid,"received",uid));

    // ✅ CREATE UNIQUE CHAT ID (VERY IMPORTANT)
    const chatId = [current.uid, uid].sort().join("_");

    // ✅ CHECK if system message already exists (PREVENT DUPLICATE)
    const systemRef = doc(db, "systemMessages", chatId);
    const systemSnap = await getDoc(systemRef);

    if(!systemSnap.exists()){
        const messageText = `🎉 Congratulations! You have been friends (${new Date().toLocaleString()})`;

        // 🔥 SEND MESSAGE TO CHAT
        await addDoc(collection(db,"messages"),{
            text: messageText,
            from: "system",
            to: uid,
            system: true,
            time: Date.now()
        });

        await addDoc(collection(db,"messages"),{
            text: messageText,
            from: "system",
            to: current.uid,
            system: true,
            time: Date.now()
        });

        // ✅ MARK AS SENT (SO ONLY ONCE)
        await setDoc(systemRef,{
            created:true
        });
    }

    showToast("Friend added ✅");
}else if(window.friendStatus === "friends"){
    await deleteDoc(doc(db,"friends",current.uid,"list",uid));
    await deleteDoc(doc(db,"friends",uid,"list",current.uid));
    showToast("Unfriended ❌");

// ❌ CANCEL REQUEST ⭐ (PUT IT HERE)
}else if(window.friendStatus === "pending"){
    await deleteDoc(doc(db,"pending",current.uid,"sent",uid));
    await deleteDoc(doc(db,"requests",uid,"received",current.uid));
    showToast("Request cancelled ❌");

// ➕ ADD FRIEND
}else{
    await setDoc(doc(db,"pending",current.uid,"sent",uid),{
        uid: uid,
        createdAt:new Date()
    });
    await setDoc(doc(db,"requests",uid,"received",current.uid),{
        uid: current.uid,
        createdAt:new Date()
    });
    showToast("Request sent 📩");
}

    await updateFriendButton(uid);
};
    
</script>

font-size:13px;

border:1px solid #23262f;

transition:.3s;
z-index:99999;
"></div>
