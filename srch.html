<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatPH | Search Users</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f1115;
--card:#171a21;
--border:#23262f;
--text:#fff;
--accent:#4da3ff;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:15px 24px;
border-bottom:1px solid var(--border);
}

/* MAIN */
.container{
padding:20px;
max-width:700px;
margin:auto;
}

/* STATS */
.stats{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:14px;
opacity:.8;
}

/* SEARCH */
.search-box{
display:flex;
gap:10px;
margin-bottom:15px;
}
.search-box input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#1f2937;
color:white;
}

/* USER CARD */
.user-card{
background:#171a21;
padding:12px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
transition:.2s;
}
.user-card:hover{
background:#1f2937;
}

/* PROFILE PREVIEW */
.profile{
margin-top:20px;
padding:15px;
background:#171a21;
border-radius:12px;
display:none;
}

.profile img{
width:70px;
height:70px;
border-radius:50%;
}

.actions{
margin-top:10px;
display:flex;
gap:10px;
}

.actions button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.add{
background:#22c55e;
}
.msg{
background:#4da3ff;
}
</style>
</head>

<body>

<header>
<h3>Search Users</h3>
</header>

<div class="container">

<div class="stats">
<span id="totalUsers">Total: 0</span>
<span id="onlineUsers">Online: 0</span>
</div>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search user...">
</div>

<div id="results"></div>

<div class="profile" id="profileBox">
<img id="avatar" src="">
<h3 id="name"></h3>
<p id="uid"></p>

<div class="actions">
<button class="add" onclick="addFriend()">Add Friend</button>
<button class="msg" onclick="messageUser()">Message</button>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
onSnapshot,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* DATA */
let users = [];
let selectedUser = null;

/* LOAD USERS */
async function loadUsers(){
const snap = await getDocs(collection(db,"users"));
users = [];

snap.forEach(docSnap=>{
users.push({
uid: docSnap.id,
...docSnap.data()
});
});

/* TOTAL USERS */
document.getElementById("totalUsers").innerText =
"Total: " + users.length;
}

/* ONLINE USERS (simple demo: logged in users) */
onSnapshot(collection(db,"users"), snap=>{
let online = 0;

snap.forEach(doc=>{
if(doc.data().online) online++;
});

document.getElementById("onlineUsers").innerText =
"Online: " + online;
});

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", function(){
const value = this.value.toLowerCase();
const box = document.getElementById("results");
box.innerHTML = "";

const filtered = users.filter(u =>
u.name && u.name.toLowerCase().includes(value)
);

filtered.forEach(u=>{
box.innerHTML += `
<div class="user-card" onclick="showProfile('${u.uid}')">
${u.name}
</div>
`;
});
});

/* SHOW PROFILE */
window.showProfile = function(uid){
const user = users.find(u=>u.uid === uid);
if(!user) return;

selectedUser = user;

document.getElementById("profileBox").style.display = "block";
document.getElementById("name").innerText = user.name;
document.getElementById("uid").innerText = user.uid;

/* avatar fallback */
document.getElementById("avatar").src =
user.photo || "https://via.placeholder.com/70";
}

/* ADD FRIEND */
window.addFriend = async function(){
if(!selectedUser) return;

const myId = auth.currentUser.uid;

await setDoc(doc(db,"friends", myId+"_"+selectedUser.uid),{
users:[myId, selectedUser.uid]
});

alert("Friend added!");
}

/* MESSAGE */
window.messageUser = function(){
if(!selectedUser) return;

localStorage.setItem("chatUser", selectedUser.uid);
window.location.href = "message.html";
}

/* AUTH */
onAuthStateChanged(auth, async(user)=>{
if(user){
await loadUsers();

/* SET ONLINE */
await setDoc(doc(db,"users", user.uid),{
online:true
},{merge:true});
}
});
</script>

</body>
</html>
