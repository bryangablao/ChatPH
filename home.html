<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatPH</title>
    <link rel="icon" type="image/png" href="image/chatph-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#0f1115; --card:#171a21; --border:#23262f; --text:#ffffff; --accent:#4da3ff; }
        body{ margin:0; font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); }
        header{ display:flex; align-items:center; justify-content:space-between; padding:12px 18px; background:#12141a; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:1000; }
        .logo{ display:flex; align-items:center; gap:10px; }
        .logo img{ width:32px; }
        .logo span{ font-weight:700; font-size:18px; }
        .hamburger{ font-size:22px; cursor:pointer; }
        .sidebar{ position:fixed; top:0; left:-230px; width:230px; height:100%; background:#14171d; border-right:1px solid var(--border); padding-top:70px; transition:.3s; z-index:1001; }
        .sidebar.open{ left:0; }
        .sidebar a{ display:flex; align-items:center; gap:12px; padding:14px 20px; text-decoration:none; color:white; font-weight:500; transition:.2s; }
        .sidebar a:hover{ background:#1e222b; }
        .marquee{ overflow:hidden; background:#0f1115; padding:10px 0; border-bottom:1px solid var(--border); }
        .marquee-track{ display:inline-block; white-space:nowrap; animation:scrollAds 30s linear infinite; color:var(--accent); font-weight:600; }
        @keyframes scrollAds{ 0%{ transform:translateX(0); } 100%{ transform:translateX(-50%); } }
        .main{ max-width:520px; margin:auto; padding:16px; }
        .create-post{ background:var(--card); padding:18px; border-radius:14px; border:1px solid var(--border); margin-bottom:20px; position:relative; }
        .editor{ width:100%; min-height:90px; background:#0c0f14; border:1px solid #2a2f3b; border-radius:14px; padding:14px; outline:none; box-sizing:border-box; word-break:break-word; font-size:15px; transition:.2s; color: white;}
        .editor:focus{ border-color:#4da3ff; box-shadow:0 0 0 2px rgba(77,163,255,.25); }
        .editor:empty:before{ content:attr(placeholder); color:#777; }
        .editor-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .post-btn { background: var(--accent); border: none; color: #000; padding: 8px 20px; border-radius: 20px; font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .post-btn:hover{ background:#82c0ff; transform:translateY(-1px); }
        .post-btn:disabled{ opacity: 0.5; cursor: not-allowed; }
        .post{ background:linear-gradient(180deg,#1a1f29,#141821); border:1px solid #2b3240; border-radius:14px; padding:16px; margin-bottom:18px; box-shadow:0 4px 14px rgba(0,0,0,.35); position:relative; }
        .post-top{ display:flex; align-items:center; gap:12px; padding-bottom:10px; border-bottom:1px solid #2a2f3b; }
        .post-text{ margin-top:14px; line-height:1.6; font-size:15px; color:#e5e7eb; }
        .post-actions{ margin-top:14px; display:flex; gap:18px; padding-top:10px; border-top:1px solid #2a2f3b; }
        .action-btn{ cursor:pointer; opacity:.8; font-size: 14px; }
        .action-btn:hover{ text-decoration:underline; opacity:1; }
        .avatar{ width:42px; height:42px; border-radius:50%; }
        .username{ font-weight:600; }
        .time{ font-size:12px; opacity:.6; }
        .admin-badge{ margin-left:2px; font-size:11px; padding:3px 8px; border-radius:20px; background:linear-gradient(90deg,#ffd700,#ffae00); color:#000; font-weight:700; }
        .logout-icon{ width:22px; cursor:pointer; display:none; }
        .upload-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: rgba(77, 163, 255, 0.1); border-radius: 50%; cursor: pointer; }
        .upload-btn img{ width:20px; }
        .upload-btn input{ display:none; }
        .image-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .preview-item { position: relative; width: 100px; height: 100px; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
        .remove-img-btn { position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-weight: bold; }
        .post-images{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; margin-top:10px; }
        .post-images img{ width:100%; border-radius:10px; }
        .reaction-counts{ display:flex; gap:6px; margin-top:10px; font-size:13px; }
        .reaction-picker{ position:absolute; bottom:35px; left:0; background:#0f141c; border:1px solid #2a2f3b; border-radius:30px; padding:6px 10px; display:flex; gap:8px; display:none; z-index: 100; }
        .reaction-picker img{ width:26px; cursor:pointer; }
        .comment-box { margin-top: 10px; }
        .comment-input{ display:flex; gap:10px; background:#0f141c; border:1px solid #2a2f3b; border-radius:20px; padding:6px 10px; }
        .comment-field{ flex:1; background:transparent; border:none; color:white; outline:none; }
        footer{ text-align:center; padding:20px; opacity:.6; font-size:14px; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <img src="image/chatph-logo.png">
        <span>ChatPH</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
        <span id="userDisplay">Guest</span>
        <img id="logoutBtn" src="image/icon/logout.png" class="logout-icon">
    </div>
</header>

<div class="sidebar" id="sidebar">
    <a href="home.html">🏠 Home</a>
    <a href="msg.html">💬 Messages</a>
    <a href="frnd.html">👥 Friends</a>
    <a href="srch.html">🔎 Search</a>
    <a href="prfl.html">👤 Profile</a>
</div>

<div class="main">
    <div class="create-post">
        <div id="postText" class="editor" contenteditable="true" placeholder="What's on your mind?"></div>
        <div id="imagePreview" class="image-preview"></div>
        <div class="editor-bar">
            <label class="upload-btn">
                <img src="image/icon/uploadimage.png">
                <input type="file" id="postImage" accept="image/*" multiple>
            </label>
            <button class="post-btn" id="postBtnTrigger">Post</button>
        </div>
    </div>
    <div id="postsFeed"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB0A7O_FkTbekDZgjjn6wGVIPKdJ1nkq9E",
        authDomain: "chatph-cc187.firebaseapp.com",
        projectId: "chatph-cc187",
        storageBucket: "chatph-cc187.firebasestorage.app",
        messagingSenderId: "324012163441",
        appId: "1:324012163441:web:7a54be2231ad2cae71f6d0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);

    let selectedFiles = [];
    const imageInput = document.getElementById("postImage");
    const preview = document.getElementById("imagePreview");

    // UI Badges
    function getBadge(email){
        if(email === "ablaobryan4400@gmail.com") return `<span class="admin-badge">💠 Admin</span>`;
        return "";
    }

    // Sidebar Toggle
    window.toggleMenu = () => document.getElementById("sidebar").classList.toggle("open");

    // Image Handling
    imageInput.addEventListener("change", (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
            selectedFiles.push(file);
            const reader = new FileReader();
            reader.onload = (event) => {
                const div = document.createElement("div");
                div.className = "preview-item";
                div.innerHTML = `<img src="${event.target.result}"><button class="remove-img-btn">×</button>`;
                div.querySelector(".remove-img-btn").onclick = () => {
                    selectedFiles = selectedFiles.filter(f => f !== file);
                    div.remove();
                };
                preview.appendChild(div);
            };
            reader.readAsDataURL(file);
        });
        imageInput.value = "";
    });

    // Create Post Function
    window.createPost = async () => {
        const btn = document.getElementById("postBtnTrigger");
        const editor = document.getElementById("postText");
        const text = editor.innerHTML.trim();
        const user = auth.currentUser;

        if (!text && selectedFiles.length === 0) return alert("Empty post!");
        if (!user) return alert("Please login.");

        btn.disabled = true;
        btn.innerText = "Posting...";

        let imageURLs = [];
        try {
            for (const file of selectedFiles) {
                const sRef = ref(storage, `posts/${Date.now()}_${file.name}`);
                const snap = await uploadBytes(sRef, file);
                const url = await getDownloadURL(snap.ref);
                imageURLs.push(url);
            }

            await addDoc(collection(db, "posts"), {
                text,
                images: imageURLs,
                name: user.displayName || "User",
                email: user.email,
                photo: user.photoURL || "https://cdn-icons-png.flaticon.com/512/3177/3177440.png",
                time: serverTimestamp()
            });

            editor.innerHTML = "";
            selectedFiles = [];
            preview.innerHTML = "";
        } catch (err) {
            console.error(err);
            alert("Storage error? Post still saved if text only.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Post";
        }
    };

    document.getElementById("postBtnTrigger").onclick = createPost;

    // Load Posts
    const feed = document.getElementById("postsFeed");
    const q = query(collection(db, "posts"), orderBy("time", "desc"));

    onSnapshot(q, (snapshot) => {
        feed.innerHTML = "";
        snapshot.forEach((postDoc) => {
            const p = postDoc.data();
            const pid = postDoc.id;
            const el = document.createElement("div");
            el.className = "post";
            el.innerHTML = `
                <div class="post-top">
                    <img class="avatar" src="${p.photo}">
                    <div>
                        <div class="username">${p.name} ${getBadge(p.email)}</div>
                        <div class="time">${p.time?.toDate().toLocaleString() || "Just now"}</div>
                    </div>
                </div>
                <div class="post-text">${p.text}</div>
                <div class="post-images">${(p.images || []).map(img => `<img src="${img}">`).join("")}</div>
                <div class="post-actions">
                    <span class="action-btn" onclick="toggleReactionPicker('${pid}')" id="like-btn-${pid}">Like</span>
                    <span class="action-btn" onclick="toggleComment('${pid}')">Comment</span>
                </div>
                <div class="reaction-picker" id="react-${pid}">
                    <img src="image/icon/Like.png" onclick="react('${pid}','like')">
                    <img src="image/icon/Love.png" onclick="react('${pid}','love')">
                </div>
                <div class="comment-box" id="comment-${pid}" style="display:none">
                    <div class="comment-input">
                        <input type="text" class="comment-field" placeholder="Comment..." onkeydown="if(event.key==='Enter') window.addComment('${pid}', this)">
                    </div>
                </div>
            `;
            feed.appendChild(el);
        });
    });

    window.toggleComment = (id) => {
        const c = document.getElementById("comment-"+id);
        c.style.display = c.style.display === "none" ? "block" : "none";
    };

    window.toggleReactionPicker = (id) => {
        const r = document.getElementById("react-"+id);
        r.style.display = r.style.display === "flex" ? "none" : "flex";
    };

    onAuthStateChanged(auth, (user) => {
        if(user) {
            document.getElementById("userDisplay").innerText = user.displayName || user.email;
            document.getElementById("logoutBtn").style.display = "inline";
        } else {
            window.location.href = "index.html";
        }
    });

    document.getElementById("logoutBtn").onclick = () => signOut(auth);
</script>
</body>
</html>
