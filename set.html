<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatPH | Settings</title>

<link rel="icon" href="image/chatph-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f1115;
--card:#171a21;
--border:#23262f;
--text:#fff;
--accent:#4da3ff;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

.menu-icon{font-size:24px;cursor:pointer;}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100vh;
background:#151921;
padding-top:70px;
transition:.3s;
z-index:999;
}
.sidebar.open{left:0;}
.sidebar a{
display:block;
padding:14px 20px;
color:white;
text-decoration:none;
}
.sidebar a:hover{background:#1f2937;}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
opacity:0;
pointer-events:none;
transition:.3s;
}
.overlay.active{
opacity:1;
pointer-events:auto;
}

/* MAIN */
.main{
max-width:420px;
margin:auto;
padding:20px;
width:100%;
}


.edit{background:#4da3ff;color:black;}
.delete{background:#ff4b4b;color:white;}

/* MODAL */
.modal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
background:rgba(0,0,0,.5);
}

.modal-box{
background:#171a21;
padding:20px;
border-radius:12px;
text-align:center;
}

.modal button{
margin:8px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    padding:20px;
    border-radius:16px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.row{
    margin-bottom:16px;
}

.label{
    font-size:12px;
    opacity:.6;
    margin-bottom:4px;
}

.value{
    font-weight:600;
    font-size:14px;
}

/* INPUT WRAPPER */
.input-wrap{
    position:relative;
}

input{
    width:100%;
    padding:10px 40px 10px 10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#0f1115;
    color:white;
    font-size:14px;
    box-sizing:border-box;
}

/* EYE BUTTON INSIDE */
.eye-btn{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:14px;
    opacity:.7;
}

/* BUTTONS */
.actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:20px;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    color:white;

    background: linear-gradient(135deg, rgba(77,163,255,0.7), rgba(0,200,255,0.4));
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);

    transition: all 0.25s ease;
}

/* hover effect */
button:hover{
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

/* delete button */
.delete{
    background: linear-gradient(135deg, rgba(255,75,75,0.8), rgba(255,0,100,0.5));
}

.edit{background:#4da3ff;color:black;}
.cancel{background:#6b7280;color:white;}

.header{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:15px 20px;
    border-bottom:1px solid var(--border);
}

.header-center{
    display:flex;
    align-items:center;
    gap:8px;
}

.logo{
    width:28px;
}

.brand{
    font-weight:700;
    font-size:16px;
}

/* Name on right */
.user-name{
    position:absolute;
    right:20px;
    font-size:14px;
    font-weight:600;
    opacity:.8;
}

.back-btn{
    position:absolute;
    left:15px;
    background:none;
    border:none;
    color:white;
    font-size:20px;
    cursor:pointer;
    opacity:.8;
}

.back-btn:hover{
    opacity:1;
}

select{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#0f1115;
    color:white;
    font-size:14px;
    appearance:none;
    outline:none;
    cursor:pointer;
}

/* custom arrow */
.select-wrap{
    position:relative;
}

.select-wrap::after{
    content:"▼";
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    pointer-events:none;
    font-size:12px;
    opacity:.6;
}

.pin-box{
    width:50px;
    height:60px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#000;
    color:#fff;
    font-size:24px;
    font-weight:bold;
    caret-color:#4da3ff;

    padding:0;
    text-align:center;

    display:flex;
    align-items:center;
    justify-content:center;
}

.pin-box:focus{
    outline:2px solid #4da3ff;
}
    
.pin-box::placeholder{
    color:#666;
}
    
/* FOOTER */
footer{
text-align:center;
padding:20px;
font-size:13px;
opacity:.6;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <button class="back-btn" onclick="goBack()">←</button>

    <div class="header-center">
        <img src="image/chatph-logo.png" class="logo">
        <span class="brand">ChatPH</span>
    </div>

    <div id="userDisplay" class="user-name">User</div>
</header>

<!-- MAIN -->
<div class="main">
<div class="card">

<div class="row">
<div class="label">Account Created</div>
<div class="value" id="createdAt"></div>
</div>

<div class="row">
  <div class="label">Email</div>
  <div class="value view" id="email"></div>
  <input id="emailInput" class="edit-field" hidden>
</div>

<div class="row">
<div class="label">First Name</div>
<div class="value view" id="viewFirstName"></div>
<input id="firstName" class="edit-field" hidden>
</div>

<div class="row">
<div class="label">Last Name</div>
<div class="value view" id="viewLastName"></div>
<input id="lastName" class="edit-field" hidden>
</div>

<div class="row">
  <div class="label">Phone</div>
  <div class="value view" id="viewPhone"></div>
  
  <div class="input-wrap edit-field" hidden>
    <input id="phone" maxlength="11" inputmode="numeric">
  </div>
</div>

<div class="row">
  <div class="label">PIN</div>

  <!-- VIEW MODE -->
  <div class="value view" id="viewPin">
    ••••••
    <span class="eye-btn" onclick="toggleViewPin()">👁</span>
  </div>

  <!-- EDIT MODE -->
  <div class="input-wrap edit-field" hidden>
    <input id="pin" type="password" maxlength="6" inputmode="numeric">
  </div>
</div>

<div class="row">
<div class="label">Birthdate</div>
<div class="value view" id="viewBirthdate"></div>
<input id="birthdate" type="date" class="edit-field" hidden>
</div>

<div class="row">
  <div class="label">Gender</div>
  <div class="value view" id="viewGender"></div>

<div class="select-wrap edit-field" hidden>
  <select id="gender">
    <option value="">Select</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
    <option value="Rather not say">Rather not say</option>
  </select>
</div>
</div>

<div class="actions">
<button class="edit" id="editBtn">Edit</button>
<button id="changePassBtn" hidden>Change Password</button>
<button class="delete" id="deleteBtn">Delete Account</button>
</div>

</div>
</div>

<!-- DELETE MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <p>Delete account permanently?</p>
    <button onclick="deleteAccount()">Yes</button>
    <button onclick="closeModal()">No</button>
  </div>
</div>

<!-- PIN MODAL (SEPARATE) -->
<div class="modal" id="pinModal">
  <div class="modal-box">
    <p>Please Enter your 6-digit PIN</p>

    <div id="pinBoxes" style="display:flex; gap:8px; justify-content:center;">
      <input class="pin-box" type="text">
      <input class="pin-box" type="text">
      <input class="pin-box" type="text">
      <input class="pin-box" type="text">
      <input class="pin-box" type="text">
      <input class="pin-box" type="text">
    </div>
      
    <input type="hidden" id="pinCheck">
    <p id="pinError" style="color:red; font-size:12px;"></p>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="modal" id="passwordModal">
  <div class="modal-box">
    <p>Enter your password to confirm email change</p>
    <input type="password" id="confirmPassword" placeholder="Password">
    <p id="passError" style="color:red; font-size:12px;"></p>
    <button onclick="confirmReauth()">Confirm</button>
    <button onclick="closePasswordModal()">Cancel</button>
  </div>
</div>

<div class="modal" id="resetModal">
  <div class="modal-box">
    <p>Send password reset email?</p>
    <p id="resetStatus" style="font-size:12px;"></p>
    <button onclick="sendReset()">Send</button>
    <button onclick="closeReset()">Cancel</button>
  </div>
</div>

<div class="modal" id="addPassModal">
  <div class="modal-box">
    <p>Add a password to your account</p>
    <input type="password" id="newPassword" placeholder="New password">
    <p id="addPassStatus" style="font-size:12px;"></p>
    <button onclick="addPassword()">Save</button>
    <button onclick="closeAddPassword()">Cancel</button>
  </div>
</div>
    
<!-- FOOTER -->
<footer>
© 2026 ChatPH
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { 
    getAuth, 
    onAuthStateChanged, 
    deleteUser,
    setPersistence,
    browserLocalPersistence,
    updateEmail,
    EmailAuthProvider,
    reauthenticateWithCredential, 
    sendPasswordResetEmail,
    linkWithCredential
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    
const app = initializeApp({
  apiKey: "AIzaSyB0A7O_FkTbekDZgjjn6wGVIPKdJ1nkq9E",
  authDomain: "chatph-cc187.firebaseapp.com",
  projectId: "chatph-cc187",
  storageBucket: "chatph-cc187.firebasestorage.app",
  messagingSenderId: "324012163441",
  appId: "1:324012163441:web:7a54be2231ad2cae71f6d0"
});

const db = getFirestore(app);
const auth = getAuth(app);
setPersistence(auth, browserLocalPersistence);

let editMode = false;
let currentUID = null;

/* SIDEBAR */
window.toggleSidebar=(close=false)=>{
sidebar.classList.toggle("open");
overlay.classList.toggle("active");
};

/* LOAD USER */
const editBtn = document.getElementById("editBtn");
const deleteBtn = document.getElementById("deleteBtn");

/* LOAD USER */
onAuthStateChanged(auth, async(user)=>{
    if (!user) return location.href="index.html";

    const providers = user.providerData.map(p => p.providerId);

    const isGoogleUser = providers.includes("google.com");
    const hasPassword = providers.includes("password");
    
    currentUID = user.uid;
    document.getElementById("email").innerText = user.email;
    emailInput.value = user.email;

    const snap = await getDoc(doc(db,"users",user.uid));
    if (!snap.exists()) return;

    const data = snap.data();

    const changePassBtn = document.getElementById("changePassBtn");
    const emailView = document.getElementById("email");
    const emailInputField = document.getElementById("emailInput");

if (isGoogleUser) {
    // Google → editable
    emailView.hidden = true;
    emailInputField.hidden = false;
} else {
    // Email/password → view only
    emailView.hidden = false;
    emailInputField.hidden = true;
}

if (isGoogleUser) {
    changePassBtn.hidden = false;

    if (hasPassword) {
        changePassBtn.innerText = "Change Password";
    } else {
        changePassBtn.innerText = "Add Password";
    }

} else {
    changePassBtn.hidden = true;
}

    document.getElementById("userDisplay").innerText =
    (data.firstName || "") + " " + (data.lastName || "");

    createdAt.innerText = data.createdAt?.toDate().toLocaleString();

    // VIEW MODE
    viewFirstName.innerText = data.firstName || "-";
    viewLastName.innerText = data.lastName || "-";
    viewPhone.innerText = data.phone || "-";
    viewBirthdate.innerText = data.birthdate || "-";
    viewGender.innerText = data.gender || "-";
    gender.value = data.gender || "";
    viewPin.innerText = data.pin ? "••••••" : "-";

    // EDIT MODE
    firstName.value = data.firstName || "";
    lastName.value = data.lastName || "";
    phone.value = data.phone || "";
    pin.value = data.pin || "";
    birthdate.value = data.birthdate || "";
    realPin = data.pin || "";
});

const phone = document.getElementById("phone");

phone.addEventListener("input", () => {
    phone.value = phone.value.replace(/\D/g, "");

    if (!phone.value.startsWith("09")) {
        phone.value = "09";
    }

    phone.value = phone.value.slice(0, 11);
});

const pinCheck = document.getElementById("pinCheck");

pinCheck.addEventListener("input", () => {
    pinCheck.value = pinCheck.value.replace(/\D/g, "").slice(0,6);
    pinError.innerText = "";
});

async function toggleEdit(){

    // 👉 IF SAVING
    if (editMode) {
        if (auth.currentUser.email !== emailInput.value) {
            openPasswordModal(emailInput.value);
            return;
        }

        try {
            await updateDoc(doc(db,"users",currentUID),{
                firstName:firstName.value,
                lastName:lastName.value,
                phone:phone.value,
                pin:pin.value,
                birthdate:birthdate.value,
                gender: gender.value
            });
            location.reload();
        } catch (err) {
            console.error(err);
        }

        return;
    }

    // 👉 ENTER EDIT MODE
    editMode = true;

const views = document.querySelectorAll(".view");
const edits = document.querySelectorAll(".edit-field");

views.forEach(v => v.hidden = true);
edits.forEach(e => e.hidden = false);

// ✅ FIX EMAIL FIELD BASED ON USER TYPE
const user = auth.currentUser;
const providers = user.providerData.map(p => p.providerId);
const isGoogleUser = providers.includes("google.com");

if (!isGoogleUser) {
    document.getElementById("email").hidden = false;
    document.getElementById("emailInput").hidden = true;
}

    editBtn.innerText = "Save";
    deleteBtn.innerText = "Cancel";
    pin.type = "text";
}

/* EDIT / UPDATE / CANCEL */
editBtn.onclick = () => {
    if (!editMode) {
        // entering edit mode → require PIN
        openPinModal("edit");
    } else {
        // already editing → just SAVE
        toggleEdit();
    }
};

deleteBtn.onclick = () => {
    if (editMode) {
        // CANCEL edit mode instantly (no PIN)
        editMode = false;

        const views = document.querySelectorAll(".view");
        const edits = document.querySelectorAll(".edit-field");

        views.forEach(v => v.hidden = false);
        edits.forEach(e => e.hidden = true);

        editBtn.innerText = "Edit";
        deleteBtn.innerText = "Delete Account";

    } else {
        // normal delete → requires PIN
        openPinModal("delete");
    }
};

/* PIN TOGGLE */
window.togglePin = ()=>{
    pin.type = pin.type === "password" ? "text" : "password";
};

/* MODAL */
window.openModal=()=> modal.style.display="flex";
window.closeModal=()=> modal.style.display="none";

/* DELETE */
window.deleteAccount = async ()=>{
await deleteDoc(doc(db,"users",currentUID));
await deleteUser(auth.currentUser);
location.href="index.html";
};

window.goBack = () => {
    window.history.back();
};

let realPin = "";

window.toggleViewPin = () => {
    const view = document.getElementById("viewPin");

    if (view.innerText.includes("•")) {
        view.innerHTML = realPin + ' <span class="eye-btn" onclick="toggleViewPin()">👁</span>';
    } else {
        view.innerHTML = '•••••• <span class="eye-btn" onclick="toggleViewPin()">👁</span>';
    }
};

let pendingAction = null;

window.openPinModal = (action) => {
    pendingAction = action;
    pinModal.style.display = "flex";
    pinCheck.value = "";
    pinError.innerText = "";
    pinError.style.color = "#4ade80";

    clearBoxes();
    boxes[0].focus(); // ✅ focus first box
};

window.closePinModal = () => {
    pinModal.style.display = "none";
};

window.verifyPin = () => {
    pinError.style.color = "#4ade80"; // ✅ ALWAYS reset to green

    if (!pinCheck.value) {
        pinError.innerText = "Please enter your PIN.";
        return;
    }

    if (pinCheck.value === String(realPin)) {
        startCheckingAnimation(true);
    } else {
        startCheckingAnimation(false);
    }
};

let pendingEmail = null;

window.openPasswordModal = (newEmail) => {
    pendingEmail = newEmail;
    passwordModal.style.display = "flex";
    confirmPassword.value = "";
    passError.innerText = "";
};

window.closePasswordModal = () => {
    passwordModal.style.display = "none";

    // 🔥 FORCE UI BACK TO EDIT MODE CLEANLY
    editMode = true;

    const views = document.querySelectorAll(".view");
    const edits = document.querySelectorAll(".edit-field");

    views.forEach(v => v.hidden = true);
    edits.forEach(e => e.hidden = false);

    editBtn.innerText = "Save";
    deleteBtn.innerText = "Cancel";
};

window.confirmReauth = async () => {
    const password = confirmPassword.value;

    const user = auth.currentUser;

    console.log("Email:", user.email);
    console.log("Password entered:", password);
    console.log("Provider:", user.providerData);

    if (!password) {
        passError.innerText = "Password required.";
        return;
    }

    try {
        const credential = EmailAuthProvider.credential(
            user.email.trim(),
            password.trim()
        );

        await reauthenticateWithCredential(user, credential);
        await verifyBeforeUpdateEmail(user, pendingEmail);

        passError.style.color = "#4ade80";
        passError.innerText = "Verification email sent. Check your inbox.";
        closePasswordModal();
        
        location.reload();

    } catch (err) {
        console.error("FULL ERROR:", err);
        console.log("Error code:", err.code);
        passError.innerText = err.code;
    }
};

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closePinModal();
});

function startCheckingAnimation(isCorrect){
    let dots = 0;
    let count = 3;

    // 🔵 DOT animation
    const interval = setInterval(() => {
        dots = (dots % 3) + 1;

        if (isCorrect) {
            pinError.innerText = `Correct PIN. Redirecting in ${count}` + ".".repeat(dots);
        } else {
            pinError.innerText = "Checking" + ".".repeat(dots);
        }
    }, 400);

    if (isCorrect) {
        // 🟢 countdown
        const countdown = setInterval(() => {
            count--;

            if (count < 0) {
                clearInterval(interval);
                clearInterval(countdown);

                closePinModal();

                if (pendingAction === "edit") toggleEdit();
                if (pendingAction === "delete") openModal();
            }
        }, 1000);

    } else {
        // 🔴 wrong pin
        setTimeout(() => {
            clearInterval(interval);

            pinError.style.color = "red";
            pinError.innerText = "Wrong PIN. Try again.";

            clearBoxes();
        }, 2000);
    }
}

const boxes = document.querySelectorAll(".pin-box");

boxes.forEach((box, index) => {
    box.addEventListener("input", () => {
    box.value = box.value.replace(/[^0-9]/g, "").slice(0,1);
    box.style.color = "#fff"; // 🔥 force visible

    if (box.value.length === 1 && index < boxes.length - 1) {
        setTimeout(() => boxes[index + 1].focus(), 50);
    }
    updatePinValue();
});

    box.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !box.value && index > 0) {
            boxes[index - 1].focus();
        }
    });
});

function updatePinValue(){
    pinCheck.value = Array.from(boxes).map(b => b.value).join("");

    if (pinCheck.value.length === 6) {
        setTimeout(() => verifyPin(), 1200);
    }
}

function clearBoxes(){
    boxes.forEach(b => b.value = "");
    boxes[0].focus();
}

window.openReset = () => {
    resetModal.style.display = "flex";
    resetStatus.innerText = "";
};

window.closeReset = () => {
    resetModal.style.display = "none";
};

window.sendReset = async () => {
    const user = auth.currentUser;
    try {
        await sendPasswordResetEmail(auth, user.email);
        resetStatus.style.color = "#4ade80";
        resetStatus.innerText = "Reset email sent!";
    } catch (err) {
        resetStatus.style.color = "red";
        resetStatus.innerText = err.message;
    }
};

changePassBtn.onclick = () => {
    const user = auth.currentUser;
    const providers = user.providerData.map(p => p.providerId);
    const hasPassword = providers.includes("password");

    if (hasPassword) {
        openReset(); // existing flow
    } else {
        openAddPassword(); // new flow
    }
};

window.openAddPassword = () => {
    addPassModal.style.display = "flex";
    addPassStatus.innerText = "";
};

window.closeAddPassword = () => {
    addPassModal.style.display = "none";
};

window.addPassword = async () => {
    const user = auth.currentUser;
    const newPassword = document.getElementById("newPassword").value;

    if (!newPassword) {
        addPassStatus.innerText = "Password required.";
        return;
    }

    try {
        const credential = EmailAuthProvider.credential(
            user.email,
            newPassword
        );

        await linkWithCredential(user, credential);

        addPassStatus.style.color = "#4ade80";
        addPassStatus.innerText = "Password added successfully!";

        setTimeout(() => location.reload(), 1500);

    } catch (err) {
        addPassStatus.style.color = "red";
        addPassStatus.innerText = err.message;
        console.error(err);
    }
};
    
</script>

</body>
</html>
