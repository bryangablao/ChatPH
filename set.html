<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatPH | Settings</title>

<link rel="icon" href="image/chatph-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f1115;
--card:#171a21;
--border:#23262f;
--text:#fff;
--accent:#4da3ff;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 24px;
border-bottom:1px solid var(--border);
}

.menu-icon{font-size:24px;cursor:pointer;}
.logo{width:30px;}
.brand{font-weight:700}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100vh;
background:#151921;
padding-top:70px;
transition:.3s;
z-index:999;
}
.sidebar.open{left:0;}
.sidebar a{
display:block;
padding:14px 20px;
color:white;
text-decoration:none;
}
.sidebar a:hover{background:#1f2937;}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
opacity:0;
pointer-events:none;
transition:.3s;
}
.overlay.active{
opacity:1;
pointer-events:auto;
}

/* MAIN */
.main{
max-width:420px;
margin:auto;
padding:20px;
width:100%;
}

/* CARD */
.card{
background:var(--card);
border:1px solid var(--border);
padding:18px;
border-radius:12px;
}

.row{
margin-bottom:12px;
}

.label{
font-size:13px;
opacity:.7;
}

.value{
font-weight:600;
}

input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#0f1115;
color:white;
margin-top:4px;
}

/* BUTTONS */
.actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
}

.edit{background:#4da3ff;color:black;}
.delete{background:#ff4b4b;color:white;}

/* MODAL */
.modal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
background:rgba(0,0,0,.5);
}

.modal-box{
background:#171a21;
padding:20px;
border-radius:12px;
text-align:center;
}

.modal button{
margin:8px;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
font-size:13px;
opacity:.6;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div style="display:flex;gap:10px;align-items:center;">
<span class="menu-icon" onclick="toggleSidebar()">☰</span>
<img src="image/chatph-logo.png" class="logo">
<span class="brand">ChatPH</span>
</div>
<div id="userDisplay">User</div>
</header>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a href="home.html">Home</a>
<a href="msg.html">Messages</a>
<a href="frnd.html">Friends</a>
<a href="srch.html">Search</a>
<a href="prfl.html">Profile</a>
<a href="#" style="color:#4da3ff;">Settings</a>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar(true)"></div>

<!-- MAIN -->
<div class="main">
<div class="card">

<div class="row">
<div class="label">Account Created</div>
<div class="value" id="createdAt"></div>
</div>

<div class="row">
<div class="label">First Name</div>
<input id="firstName" disabled>
</div>

<div class="row">
<div class="label">Last Name</div>
<input id="lastName" disabled>
</div>

<div class="row">
<div class="label">Phone</div>
<input id="phone" disabled>
</div>

<div class="row">
<div class="label">PIN</div>
<input id="pin" type="password" disabled>
<button onclick="togglePin()">👁</button>
</div>

<div class="actions">
<button class="edit" id="editBtn">Edit</button>
<button class="delete" onclick="openModal()">Delete</button>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<p>Delete account permanently?</p>
<button onclick="deleteAccount()">Yes</button>
<button onclick="closeModal()">No</button>
</div>
</div>

<!-- FOOTER -->
<footer>
© 2026 ChatPH
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { 
    getAuth, 
    onAuthStateChanged, 
    deleteUser,
    setPersistence,
    browserLocalPersistence 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyB0A7O_FkTbekDZgjjn6wGVIPKdJ1nkq9E",
  authDomain: "chatph-cc187.firebaseapp.com",
  projectId: "chatph-cc187",
  storageBucket: "chatph-cc187.firebasestorage.app",
  messagingSenderId: "324012163441",
  appId: "1:324012163441:web:7a54be2231ad2cae71f6d0"
});

const db = getFirestore(app);
const auth = getAuth(app);
setPersistence(auth, browserLocalPersistence);

let editMode = false;
let currentUID = null;

/* SIDEBAR */
window.toggleSidebar=(close=false)=>{
sidebar.classList.toggle("open");
overlay.classList.toggle("active");
};

/* LOAD USER */
let isAuthReady = false;

onAuthStateChanged(auth, async(user)=>{
    if (!user) {
        // ⏳ wait until Firebase fully initializes
        if (!isAuthReady) return;
        return location.href = "index.html";
    }

    isAuthReady = true;

    currentUID = user.uid;
    document.getElementById("userDisplay").innerText = user.email;

    const snap = await getDoc(doc(db,"users",user.uid));
    const data = snap.data();

    createdAt.innerText = data.createdAt?.toDate().toLocaleString();
    firstName.value = data.firstName;
    lastName.value = data.lastName;
    phone.value = data.phone;
    pin.value = data.pin;
});

/* EDIT */
editBtn.onclick = async ()=>{
editMode = !editMode;

[firstName,lastName,phone,pin].forEach(i=>{
i.disabled = !editMode;
});

editBtn.innerText = editMode ? "Update" : "Edit";

if(!editMode){
await updateDoc(doc(db,"users",currentUID),{
firstName:firstName.value,
lastName:lastName.value,
phone:phone.value,
pin:pin.value
});
alert("Updated ✅");
}
};

/* PIN TOGGLE */
window.togglePin=()=>{
pin.type = pin.type==="password"?"text":"password";
};

/* MODAL */
window.openModal=()=> modal.style.display="flex";
window.closeModal=()=> modal.style.display="none";

/* DELETE */
window.deleteAccount = async ()=>{
await deleteDoc(doc(db,"users",currentUID));
await deleteUser(auth.currentUser);
location.href="index.html";
};
</script>

</body>
</html>
