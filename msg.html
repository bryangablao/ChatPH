<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - ChatPH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f1115;
--card:#171a21;
--border:#23262f;
--text:#ffffff;
--accent:#4da3ff;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 24px;
border-bottom:1px solid var(--border);
}

/* SIDEBAR (same as yours) */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:rgba(21,25,33,0.75);
padding-top:70px;
transition:.3s;
z-index:999;
}
.sidebar.open{ left:0; }

/* MAIN */
.main{
display:flex;
height:calc(100vh - 60px);
}

/* LEFT PANEL */
.left{
width:300px;
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
}

/* SEARCH */
.search{
padding:10px;
border-bottom:1px solid var(--border);
}

.search input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
background:#1f2937;
color:white;
outline:none;
}

/* USER LIST */
.user-list{
flex:1;
overflow-y:auto;
}

.user{
padding:12px;
cursor:pointer;
border-bottom:1px solid var(--border);
}

.user:hover{
background:#1a1f29;
}

/* RIGHT CHAT */
.chat{
flex:1;
display:flex;
flex-direction:column;
}

/* EMPTY */
.empty{
display:flex;
justify-content:center;
align-items:center;
height:100%;
opacity:.5;
}

/* MESSAGES */
.messages{
flex:1;
padding:15px;
overflow-y:auto;
}

.msg{
padding:10px 14px;
margin:6px 0;
border-radius:14px;
max-width:60%;
}

.me{
background:var(--accent);
color:#000;
margin-left:auto;
}

.other{
background:#1f2937;
}

/* INPUT */
.input{
display:flex;
padding:10px;
border-top:1px solid var(--border);
}

.input input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#1f2937;
color:white;
}

.input button{
margin-left:10px;
padding:10px 16px;
border:none;
border-radius:20px;
background:var(--accent);
cursor:pointer;
}

/* GROUP BUTTON */
.group-btn{
padding:10px;
text-align:center;
border-top:1px solid var(--border);
cursor:pointer;
background:#11141a;
}

.group-btn:hover{
background:#1a1f29;
}

/* GROUP PANEL */
.group-panel{
position:fixed;
right:-300px;
top:0;
width:300px;
height:100%;
background:#11141a;
transition:.3s;
z-index:1000;
padding:10px;
}

.group-panel.open{
right:0;
}

.not-found{
padding:10px;
color:red;
font-size:13px;
}
</style>
</head>

<body>

<header>
<span>💬 Messages</span>
</header>

<div class="main">

<!-- LEFT -->
<div class="left">

<div class="search">
<input type="text" id="searchUser" placeholder="Search user...">
</div>

<div class="user-list" id="userList"></div>

<div class="group-btn" onclick="toggleGroup()">➕ Create Group</div>

</div>

<!-- RIGHT -->
<div class="chat">

<div id="empty" class="empty">Select a conversation</div>

<div id="chatUI" style="display:none;flex:1;flex-direction:column;">
<div class="messages" id="messages"></div>

<div class="input">
<input id="msgInput" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>
</div>
</div>

</div>
</div>

<!-- GROUP PANEL -->
<div class="group-panel" id="groupPanel">
<h3>Create Group</h3>
<input id="groupSearch" placeholder="Search users..." style="width:100%;padding:8px;">
<div id="groupResults"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, addDoc, query, where, getDocs,
onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "chatph-cc187.firebaseapp.com",
projectId: "chatph-cc187"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentChatId = null;

/* SEARCH USER */
document.getElementById("searchUser").addEventListener("input", async (e)=>{
const val = e.target.value;

if(!val){
document.getElementById("userList").innerHTML="";
return;
}

const q = query(collection(db,"users"), where("name",">=",val));
const snap = await getDocs(q);

const list = document.getElementById("userList");
list.innerHTML="";

if(snap.empty){
list.innerHTML = `<div class="not-found">User not found</div>`;
return;
}

snap.forEach(doc=>{
const u = doc.data();

const div = document.createElement("div");
div.className="user";
div.innerText = u.name;

div.onclick = ()=> openChat(doc.id, u.name);

list.appendChild(div);
});
});

/* OPEN CHAT */
function openChat(uid,name){
currentChatId = uid;

document.getElementById("empty").style.display="none";
document.getElementById("chatUI").style.display="flex";

loadMessages(uid);
}

/* LOAD MESSAGES */
function loadMessages(uid){
const ref = collection(db,"chats",uid,"messages");

onSnapshot(ref,(snap)=>{
const box = document.getElementById("messages");
box.innerHTML="";

snap.forEach(d=>{
const m = d.data();
box.innerHTML += `
<div class="msg ${m.sender===auth.currentUser.uid ? 'me':'other'}">
${m.text}
</div>`;
});
});
}

/* SEND */
window.sendMsg = async ()=>{
const text = document.getElementById("msgInput").value;
if(!text) return;

await addDoc(collection(db,"chats",currentChatId,"messages"),{
text:text,
sender:auth.currentUser.uid,
time:serverTimestamp()
});

document.getElementById("msgInput").value="";
};

/* GROUP PANEL */
window.toggleGroup = ()=>{
document.getElementById("groupPanel").classList.toggle("open");
};
</script>

</body>
</html>
