<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - ChatPH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f1115;
--card:#171a21;
--border:#23262f;
--text:#ffffff;
--accent:#4da3ff;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

/* HEADER */
header {
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 24px;
border-bottom:1px solid var(--border);
background:var(--bg);
position:sticky;
top:0;
z-index:100;
}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.menu-icon{
font-size:26px;
cursor:pointer;
}

.logo{
width:32px;
height:32px;
border-radius:6px;
}

.brand{
font-weight:700;
font-size:1.2rem;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:rgba(21,25,33,0.75);
backdrop-filter: blur(12px);
border-right:1px solid rgba(255,255,255,0.08);
padding-top:70px;
transition:.3s;
z-index:999;
}

.sidebar.open{
left:0;
}

.sidebar a{
display:block;
padding:14px 20px;
text-decoration:none;
color:white;
position:relative;
overflow:hidden;
z-index:1;
}

.sidebar a::before{
content:"";
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;
background:rgba(59,130,246,0.1);
transition:left 0.25s ease;
z-index:0;
}

.sidebar a:hover::before{
left:0;
}

.sidebar a:hover{
color:var(--accent);
}

.sidebar a.active{
background:rgba(59,130,246,0.15);
color:var(--accent);
border-left:3px solid var(--accent);
}

/* INDICATOR */
.indicator{
position:absolute;
left:0;
width:4px;
height:44px;
background:var(--accent);
border-radius:4px;
transition:.3s;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:998;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* MAIN CHAT LAYOUT */
.main{
display:flex;
height:calc(100vh - 70px);
}

/* LEFT: USERS */
.chat-list{
width:260px;
border-right:1px solid var(--border);
background:#11141a;
overflow-y:auto;
}

/* USER ITEM */
.chat-user{
    padding:14px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition:.2s;
}

.chat-user:hover{
    background:#1a1f29;
}

/* RIGHT: CHAT BOX */
.chat-box{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:16px;
overflow-y:auto;
}

.msg{
margin-bottom:10px;
padding:10px 14px;
border-radius:14px;
max-width:60%;
}

.msg.me{
background:var(--accent);
color:#000;
margin-left:auto;
}

.msg.other{
background:#1f2937;
}

/* INPUT */
.chat-input{
display:flex;
padding:12px;
border-top:1px solid var(--border);
}

.chat-input input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#1f2937;
color:white;
outline:none;
}

.chat-input button{
margin-left:10px;
padding:10px 16px;
border:none;
border-radius:20px;
background:var(--accent);
font-weight:600;
cursor:pointer;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
opacity:.6;
font-size:14px;
}
footer a:hover{
text-decoration:underline;
}
/* BADGES */
.admin-badge{
margin-left:2px;
position:relative;    
font-size:11px;
top:-2px;
padding:3px 8px;
border-radius:20px;
background:linear-gradient(90deg,#ffd700,#ffae00);
color:#000;
font-weight:700;
}
.mod-badge{
margin-left:2px;
position:relative;    
font-size:11px;
top:-2px;
padding:3px 8px;
border-radius:20px;
background:linear-gradient(90deg,#a855f7,#7e22ce);
color:white;
font-weight:600;
}
.vip-badge{
margin-left:2px;
position:relative;    
font-size:11px;
top:-2px;
padding:3px 8px;
border-radius:20px;
background:linear-gradient(90deg,#ff00cc,#ff66ff);
color:white;
font-weight:700;
}

/* TOP SEARCH BAR */
.chat-top{
    display:flex;
    gap:8px;
    padding:10px;
    border-bottom:1px solid var(--border);
}

.chat-top input{
    flex:1;
    padding:8px 12px;
    border-radius:20px;
    border:none;
    background:#1f2937;
    color:white;
    outline:none;
}

/* + BUTTON */
.create-btn{
    width:38px;
    height:38px;
    border-radius:50%;
    border:none;
    background:var(--accent);
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

/* NOT FOUND */
.not-found{
    padding:12px;
    font-size:13px;
    opacity:.6;
}

.group-panel{
    position:fixed;
    right:-300px;
    top:70px;
    width:280px;
    height:100%;
    background:#11141a;
    border-left:1px solid var(--border);
    padding:12px;
    transition:.3s;
    z-index:999;
}

.group-panel.open{
    right:0;
}

.group-panel input{
    width:100%;
    padding:8px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:#1f2937;
    color:white;
}
  
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="header-left">
<span class="menu-icon" onclick="toggleSidebar()">☰</span>
<img src="image/chatph-logo.png" class="logo">
<span class="brand">ChatPH</span>
</div>

<div>Messages</div>
</header>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a href="home.html">Home</a>
<a href="#" class="active">Messages</a>
<a href="frnd.html">Friends</a>
<a href="srch.html">Search User</a>
<a href="prfl.html">Profile</a>
<div class="indicator" id="indicator"></div>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar(true)"></div>

<!-- MAIN -->
<div class="main">

<!-- USERS -->
<div class="chat-list">

    <!-- SEARCH + CREATE -->
    <div class="chat-top">
        <input type="text" id="userSearch" placeholder="Search user...">
        <button class="create-btn" onclick="openGroupPanel()">+</button>
    </div>

    <!-- USER RESULTS -->
    <div id="userResults"></div>

</div>

<!-- CHAT -->
<!-- CHAT -->
<div class="chat-box" id="chatBox">

    <!-- EMPTY STATE -->
    <div id="emptyState" style="margin:auto;text-align:center;opacity:.5;">
        Select a user to start chatting
    </div>

    <!-- CHAT UI -->
    <div id="chatUI" style="display:none;flex-direction:column;height:100%;">
        
        <!-- HEADER -->
        <div id="chatHeader" style="padding:12px;border-bottom:1px solid var(--border);font-weight:600;"></div>

        <!-- MESSAGES -->
        <div class="messages" id="messages"></div>

        <!-- INPUT -->
        <div class="chat-input">
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button onclick="sendMsg()">Send</button>
        </div>

    </div>

</div>
    
<input type="text" id="msgInput" placeholder="Type a message...">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<!-- GROUP PANEL -->
<div class="group-panel" id="groupPanel">
    <h3>Create Group</h3>
    <input type="text" id="groupSearch" placeholder="Search users...">
    <div id="groupUsers"></div>
    <button onclick="createGroup()">Create Group</button>
</div>
  
</div>

<!-- FOOTER -->
<footer>
<div>© 2026 ChatPH • All Rights Reserved</div>
<div style="margin-top:6px;font-size:13px;">
<a href="#" style="color:#4da3ff;text-decoration:none;">About</a>

<a href="#" style="color:#4da3ff;text-decoration:none;">Privacy</a>

&nbsp;|&nbsp;
<a href="#" style="color:#4da3ff;text-decoration:none;">Contact</a>
</div>
<div style="margin-top:6px;font-size:12px;opacity:.7;">
Made with ❤️ in the Philippines
</div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    query,
    addDoc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0A7O_FkTbekDZgjjn6wGVIPKdJ1nkq9E",
  authDomain: "chatph-cc187.firebaseapp.com",
  projectId: "chatph-cc187",
  storageBucket: "chatph-cc187.firebasestorage.app",
  messagingSenderId: "324012163441",
  appId: "1:324012163441:web:7a54be2231ad2cae71f6d0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allUsers = [];

async function loadUsers(){
    const q = query(collection(db, "users"));
    const snap = await getDocs(q);

    allUsers = [];

    snap.forEach(doc=>{
        const data = doc.data();
        if(data.name){
            allUsers.push({
    name: data.name,
    uid: doc.id
});
        }
    });
}

loadUsers();
    
/* SIDEBAR */
function toggleSidebar(forceClose=false){
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

if(forceClose){
sidebar.classList.remove("open");
overlay.classList.remove("active");
}else{
sidebar.classList.toggle("open");
overlay.classList.toggle("active");
}
}

let currentChatUser = "";

function openChat(uid){
    currentChatUser = uid;

    // find user name
    const user = allUsers.find(u => u.uid === uid);

    // hide empty, show chat
    document.getElementById("emptyState").style.display = "none";
    document.getElementById("chatUI").style.display = "flex";

    // set header name
    document.getElementById("chatHeader").innerText = user ? user.name : "User";

    loadMessages();
}

async function sendMsg(){
    const input = document.getElementById("msgInput");
    const text = input.value.trim();
    if(!text || !currentChatUser) return;

    const user = auth.currentUser;

    await addDoc(collection(db, "messages"), {
        text: text,
        from: user.uid,
        to: currentChatUser,
        time: Date.now()
    });

    input.value="";
}

/* INDICATOR */
const links = document.querySelectorAll(".sidebar a");
const indicator = document.getElementById("indicator");

links.forEach(link=>{
link.onclick=()=>{
links.forEach(l=>l.classList.remove("active"));
link.classList.add("active");

indicator.style.top = link.offsetTop+"px";
indicator.style.height = link.offsetHeight+"px";
};
});

window.addEventListener("load",()=>{
const active = document.querySelector(".sidebar a.active");
indicator.style.top = active.offsetTop+"px";
indicator.style.height = active.offsetHeight+"px";
});

/* FAKE USER DATABASE (replace later with Firebase) */
const users = [
    "Bryan",
    "Alex",
    "John",
    "Jane"
];

/* SEARCH USER */
document.getElementById("userSearch").addEventListener("input", function(){
    const value = this.value.toLowerCase();
    const results = document.getElementById("userResults");
    results.innerHTML = "";

    if(!value){
        results.innerHTML = `<div class="not-found">Search for users...</div>`;
        return;
    }

    const filtered = allUsers.filter(u => u.name.toLowerCase().includes(value));

    if(filtered.length === 0){
        results.innerHTML = `<div class="not-found">User not found</div>`;
        return;
    }

    filtered.forEach(user=>{
    results.innerHTML += `
        <div class="chat-user" onclick="openChat('${user.uid}')">
            ${user.name}
        </div>
    `;
});
});

/* GROUP PANEL */
function openGroupPanel(){
    document.getElementById("groupPanel").classList.toggle("open");
}

/* CREATE GROUP (demo only) */
function createGroup(){
    alert("Group created (demo)");
}

function loadMessages(){
    const box = document.getElementById("messages");

    onSnapshot(collection(db, "messages"), (snap)=>{
        box.innerHTML = "";

        snap.forEach(doc=>{
            const m = doc.data();

            if(
                (m.from === auth.currentUser.uid && m.to === currentChatUser) ||
                (m.from === currentChatUser && m.to === auth.currentUser.uid)
            ){
                box.innerHTML += `
                    <div class="msg ${m.from === auth.currentUser.uid ? "me" : "other"}">
                        ${m.text}
                    </div>
                `;
            }
        });

        box.scrollTop = box.scrollHeight;
    });
}
    
</script>

</body>
</html>
