<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - ChatPH</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f1115;
--card:#171a21;
--border:#23262f;
--text:#ffffff;
--accent:#4da3ff;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
}

/* HEADER */
header {
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 24px;
border-bottom:1px solid var(--border);
background:var(--bg);
position:sticky;
top:0;
z-index:100;
}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.menu-icon{
font-size:26px;
cursor:pointer;
}

.logo{
width:32px;
height:32px;
border-radius:6px;
}

.brand{
font-weight:700;
font-size:1.2rem;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:rgba(21,25,33,0.75);
backdrop-filter: blur(12px);
border-right:1px solid rgba(255,255,255,0.08);
padding-top:70px;
transition:.3s;
z-index:999;
}

.sidebar.open{
left:0;
}

.sidebar a{
display:block;
padding:14px 20px;
text-decoration:none;
color:white;
position:relative;
overflow:hidden;
z-index:1;
}

.sidebar a::before{
content:"";
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;
background:rgba(59,130,246,0.1);
transition:left 0.25s ease;
z-index:0;
}

.sidebar a:hover::before{
left:0;
}

.sidebar a:hover{
color:var(--accent);
}

.sidebar a.active{
background:rgba(59,130,246,0.15);
color:var(--accent);
border-left:3px solid var(--accent);
}

/* INDICATOR */
.indicator{
position:absolute;
left:0;
width:4px;
height:44px;
background:var(--accent);
border-radius:4px;
transition:.3s;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:998;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* MAIN CHAT LAYOUT */
.main{
display:flex;
height:calc(100vh - 70px);
}

/* LEFT: USERS */
.chat-list{
width:260px;
border-right:1px solid var(--border);
background:#11141a;
overflow-y:auto;
}

.chat-user{
padding:14px;
border-bottom:1px solid var(--border);
cursor:pointer;
}

.chat-user:hover{
background:#1a1f29;
}

/* RIGHT: CHAT BOX */
.chat-box{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:16px;
overflow-y:auto;
}

.msg{
margin-bottom:10px;
padding:10px 14px;
border-radius:14px;
max-width:60%;
}

.msg.me{
background:var(--accent);
color:#000;
margin-left:auto;
}

.msg.other{
background:#1f2937;
}

/* INPUT */
.chat-input{
display:flex;
padding:12px;
border-top:1px solid var(--border);
}

.chat-input input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
background:#1f2937;
color:white;
outline:none;
}

.chat-input button{
margin-left:10px;
padding:10px 16px;
border:none;
border-radius:20px;
background:var(--accent);
font-weight:600;
cursor:pointer;
}

/* FOOTER */
footer{
text-align:center;
padding:15px;
font-size:13px;
opacity:.6;
}

/* TOP SEARCH BAR */
.chat-top{
    display:flex;
    gap:8px;
    padding:10px;
    border-bottom:1px solid var(--border);
}

.chat-top input{
    flex:1;
    padding:8px 12px;
    border-radius:20px;
    border:none;
    background:#1f2937;
    color:white;
    outline:none;
}

/* + BUTTON */
.create-btn{
    width:38px;
    height:38px;
    border-radius:50%;
    border:none;
    background:var(--accent);
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

/* USER ITEM */
.chat-user{
    padding:14px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition:.2s;
}

.chat-user:hover{
    background:#1a1f29;
}

/* NOT FOUND */
.not-found{
    padding:12px;
    font-size:13px;
    opacity:.6;
}

.group-panel{
    position:fixed;
    right:-300px;
    top:70px;
    width:280px;
    height:100%;
    background:#11141a;
    border-left:1px solid var(--border);
    padding:12px;
    transition:.3s;
    z-index:999;
}

.group-panel.open{
    right:0;
}

.group-panel input{
    width:100%;
    padding:8px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:#1f2937;
    color:white;
}
  
</style>
</head>

<body>

<!-- HEADER -->
<header>
<div class="header-left">
<span class="menu-icon" onclick="toggleSidebar()">☰</span>
<img src="image/chatph-logo.png" class="logo">
<span class="brand">ChatPH</span>
</div>

<div>Messages</div>
</header>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<a href="home.html">Home</a>
<a href="#" class="active">Messages</a>
<a href="frnd.html">Friends</a>
<a href="srch.html">Search User</a>
<a href="prfl.html">Profile</a>
<div class="indicator" id="indicator"></div>
</div>

<div class="overlay" id="overlay" onclick="toggleSidebar(true)"></div>

<!-- MAIN -->
<div class="main">

<!-- USERS -->
<div class="chat-list">

    <!-- SEARCH + CREATE -->
    <div class="chat-top">
        <input type="text" id="userSearch" placeholder="Search user...">
        <button class="create-btn" onclick="openGroupPanel()">+</button>
    </div>

    <!-- USER RESULTS -->
    <div id="userResults"></div>
<div class="chat-user">John Doe</div>
<div class="chat-user">Jane Smith</div>
<div class="chat-user">Alex</div>
</div>

<!-- CHAT -->
<div class="chat-box">
<div class="messages" id="messages"></div>

<div class="chat-input">
<input type="text" id="msgInput" placeholder="Type a message...">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<!-- GROUP PANEL -->
<div class="group-panel" id="groupPanel">
    <h3>Create Group</h3>
    <input type="text" id="groupSearch" placeholder="Search users...">
    <div id="groupUsers"></div>
    <button onclick="createGroup()">Create Group</button>
</div>
  
</div>

<!-- FOOTER -->
<footer>
© 2026 ChatPH
</footer>

<script>
/* SIDEBAR */
function toggleSidebar(forceClose=false){
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

if(forceClose){
sidebar.classList.remove("open");
overlay.classList.remove("active");
}else{
sidebar.classList.toggle("open");
overlay.classList.toggle("active");
}
}

/* CHAT DEMO FUNCTION */
function sendMsg(){
const input = document.getElementById("msgInput");
const text = input.value.trim();
if(!text) return;

const msgBox = document.getElementById("messages");

msgBox.innerHTML += `<div class="msg me">${text}</div>`;

input.value="";
msgBox.scrollTop = msgBox.scrollHeight;
}

/* INDICATOR */
const links = document.querySelectorAll(".sidebar a");
const indicator = document.getElementById("indicator");

links.forEach(link=>{
link.onclick=()=>{
links.forEach(l=>l.classList.remove("active"));
link.classList.add("active");

indicator.style.top = link.offsetTop+"px";
indicator.style.height = link.offsetHeight+"px";
};
});

window.addEventListener("load",()=>{
const active = document.querySelector(".sidebar a.active");
indicator.style.top = active.offsetTop+"px";
indicator.style.height = active.offsetHeight+"px";
});

/* FAKE USER DATABASE (replace later with Firebase) */
const users = [
    "Bryan",
    "Alex",
    "John",
    "Jane"
];

/* SEARCH USER */
document.getElementById("userSearch").addEventListener("input", function(){
    const value = this.value.toLowerCase();
    const results = document.getElementById("userResults");
    results.innerHTML = "";

    const filtered = users.filter(u => u.toLowerCase().includes(value));

    if(filtered.length === 0){
        results.innerHTML = `<div class="not-found">User not found</div>`;
        return;
    }

    filtered.forEach(user=>{
        results.innerHTML += `
            <div class="chat-user" onclick="openChat('${user}')">
                ${user}
            </div>
        `;
    });
});

/* OPEN CHAT */
function openChat(name){
    const box = document.getElementById("messages");
    box.innerHTML = `<div class="msg other">Chat with ${name}</div>`;
}

/* GROUP PANEL */
function openGroupPanel(){
    document.getElementById("groupPanel").classList.toggle("open");
}

/* CREATE GROUP (demo only) */
function createGroup(){
    alert("Group created (demo)");
}
  
</script>

</body>
</html>
