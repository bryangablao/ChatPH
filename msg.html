<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatPH | Message</title>
<link rel="icon" type="image/png" href="image/chatph-logo.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f1115;
--card:#171a21;
--border:#23262f;
--text:#ffffff;
--accent:#4da3ff;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
overflow:auto;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
header {
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 24px;
border-bottom:1px solid var(--border);
background:var(--bg);
position:sticky;
top:0;
z-index:100;
}

.header-left{
display:flex;
align-items:center;
gap:12px;
}

.menu-icon{
    font-size:26px;
    cursor:pointer;
    position:relative;
    z-index:2000;
}

.logo{
width:32px;
height:32px;
border-radius:6px;
}

.brand{
font-weight:700;
font-size:1.2rem;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:240px;
height:100%;
background:rgba(21,25,33,0.75);
backdrop-filter: blur(12px);
border-right:1px solid rgba(255,255,255,0.08);
padding-top:70px;
transition:.3s;
z-index:999;
}

.sidebar.open{
left:0;
}

.sidebar a{
display:block;
padding:14px 20px;
text-decoration:none;
color:white;
position:relative;
overflow:hidden;
z-index:1;
}

.sidebar a::before{
content:"";
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;
background:rgba(59,130,246,0.1);
transition:left 0.25s ease;
z-index:0;
}

.sidebar a:hover::before{
left:0;
}

.sidebar a:hover{
color:var(--accent);
}

.sidebar a.active{
background:rgba(59,130,246,0.15);
color:var(--accent);
border-left:3px solid var(--accent);
}

/* INDICATOR */
.indicator{
position:absolute;
left:0;
width:4px;
height:44px;
background:var(--accent);
border-radius:4px;
transition:.3s;
}

/* OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:998;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* MAIN CHAT LAYOUT */
.main{
    flex:1;
    display:flex;
    overflow:hidden;
}

/* LEFT: USERS */
.chat-list{
width:260px;
border-right:1px solid var(--border);
background:#11141a;
overflow-y:auto;
}

/* USER ITEM */
.chat-user{
    padding:14px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition:.2s;
}

.chat-user:hover{
    background:#1a1f29;
}

/* RIGHT: CHAT BOX */
.chat-box{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:16px;
overflow-y:auto;
}

.msg{
margin-bottom:10px;
padding:10px 14px;
border-radius:14px;
max-width:60%;
}

.msg.me{
background:var(--accent);
color:#000;
margin-left:auto;
}

.msg.other{
background:#1f2937;
}

/* INPUT */
.chat-input{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
    border-top:1px solid var(--border);
    background:#11141a;
}

.chat-input input{
    flex:1;
    padding:12px 16px;
    border-radius:30px;
    border:none;
    background:#1f2937;
    color:white;
    outline:none;
    font-size:14px;
}

.chat-input button{
    padding:10px 18px;
    border:none;
    border-radius:30px;
    background:var(--accent);
    color:#000;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

.chat-input button:hover{
    opacity:.8;
}

/* FOOTER */
footer{
    text-align:center;
    padding:10px;
    font-size:13px;
    opacity:.6;
    background:var(--bg);
}
    
footer a:hover{
text-decoration:underline;
}
    
/* BADGES */
.admin-badge{
margin-left:2px;
position:relative;    
font-size:11px;
top:-2px;
padding:3px 8px;
border-radius:20px;
background:linear-gradient(90deg,#ffd700,#ffae00);
color:#000;
font-weight:700;
}
.mod-badge{
margin-left:2px;
position:relative;    
font-size:11px;
top:-2px;
padding:3px 8px;
border-radius:20px;
background:linear-gradient(90deg,#a855f7,#7e22ce);
color:white;
font-weight:600;
}
.vip-badge{
margin-left:2px;
position:relative;    
font-size:11px;
top:-2px;
padding:3px 8px;
border-radius:20px;
background:linear-gradient(90deg,#ff00cc,#ff66ff);
color:white;
font-weight:700;
}

/* TOP SEARCH BAR */
.chat-top{
    display:flex;
    gap:8px;
    padding:10px;
    border-bottom:1px solid var(--border);
}

.chat-top input{
    flex:1;
    padding:8px 12px;
    border-radius:20px;
    border:none;
    background:#1f2937;
    color:white;
    outline:none;
}

/* + BUTTON */
.create-btn{
    width:38px;
    height:38px;
    border-radius:50%;
    border:none;
    background:var(--accent);
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

/* NOT FOUND */
.not-found{
    padding:12px;
    font-size:13px;
    opacity:.6;
}

.group-panel{
    position:fixed;
    right:-300px;
    top:70px;
    width:280px;
    height:100%;
    background:#11141a;
    border-left:1px solid var(--border);
    padding:12px;
    transition:.3s;
    z-index:999;
}

.group-panel.open{
    right:0;
}

.group-panel input{
    width:100%;
    padding:10px 12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:#1f2937;
    color:white;
    box-sizing:border-box; /* 🔥 IMPORTANT FIX */
}

.group-panel h3{
    margin-bottom:10px;
}

.group-panel label{
    font-size:12px;
    opacity:.7;
}

.group-panel select{
    width:100%;
    padding:8px;
    border-radius:10px;
    border:none;
    background:#1f2937;
    color:white;
    margin-bottom:10px;
}

.group-panel button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    background:var(--accent);
    color:#000;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
    transition:.2s;
}

.group-panel button:hover{
    opacity:.8;
}

.member-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 10px;
    margin:4px;
    border-radius:20px;
    background:#1f2937;
    font-size:12px;
    cursor:pointer;
    transition:.2s;
}

.member-chip:hover{
    background:#2a3342;
}
.menu-icon{
    position:relative;
    z-index:1001;
}

#chatHeader{
    font-size:15px;
    background:#11141a;
}

#logoutBtn {
    cursor: pointer;
    color: #aaa;
    font-weight: 600;
    font-size: 14px;
}
    
#logoutBtn:hover {
    color: #ff4b4b;
}

#groupUsers .chat-user{
    font-size:13px;
}
    
</style>
</head>

<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    query,
    where,
    addDoc,
    onSnapshot,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0A7O_FkTbekDZgjjn6wGVIPKdJ1nkq9E",
  authDomain: "chatph-cc187.firebaseapp.com",
  projectId: "chatph-cc187",
  storageBucket: "chatph-cc187.firebasestorage.app",
  messagingSenderId: "324012163441",
  appId: "1:324012163441:web:7a54be2231ad2cae71f6d0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allUsers = [];
let selectedMembers = [];
let currentGroup = null;
let unsubscribe = null;
let groupTheme = "";
let chatListUnsubscribe = null;
    
async function loadUsers(){
    const q = query(collection(db, "users"));
    const snap = await getDocs(q);

    allUsers = [];

    snap.forEach(docSnap=>{
const data = docSnap.data();
const id = docSnap.id;

if(data.name){
    allUsers.push({
        name: data.name,
        uid: id
    });
}
    });
}

function loadChatList(){
    const box = document.getElementById("userResults");

    // 🔥 stop old listener
    if(chatListUnsubscribe) chatListUnsubscribe();

    chatListUnsubscribe = onSnapshot(collection(db, "messages"), async (snap)=>{
        let chatMap = {};
        const myId = auth.currentUser.uid;

        snap.forEach(doc=>{
            const m = doc.data();
            if((m.from === myId || m.to === myId) && !m.groupId){
                const otherUser = m.from === myId ? m.to : m.from;
                if(!chatMap[otherUser] || chatMap[otherUser] < m.time){
                    chatMap[otherUser] = m.time;
                }
            }
        });

        const sorted = Object.entries(chatMap).sort((a,b)=>b[1]-a[1]);
        box.innerHTML = "";

        sorted.forEach(([uid])=>{
            const user = allUsers.find(u => u.uid === uid);
            box.innerHTML += `
                <div class="chat-user" onclick="openChat('${uid}')">
                    ${user ? user.name : "Unknown User"}
                </div>
            `;
        });

        // GROUPS
        box.innerHTML += `<div class="not-found">Groups</div>`;

        const groupSnap = await getDocs(collection(db, "groups"));
        groupSnap.forEach(doc=>{
            const g = doc.data();
            if(g.members.includes(myId)){
                box.innerHTML += `
                    <div class="chat-user" onclick="openGroup('${doc.id}', '${g.name}', '${g.theme}')">
                        👥 ${g.name}
                    </div>
                `;
            }
        });
    });
}

import { setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

onAuthStateChanged(auth, async (user) => {
    if(user){
        await setDoc(doc(db, "users", user.uid), {
            name: user.displayName || "No Name"
        }, { merge: true });

        await loadUsers();
        await loadChatList();
        document.getElementById("userName").innerText = user.displayName;
    }
});
    
/* SIDEBAR */
function toggleSidebar(forceClose=false){
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

if(forceClose){
sidebar.classList.remove("open");
overlay.classList.remove("active");
}else{
sidebar.classList.toggle("open");
overlay.classList.toggle("active");
}
}

let currentChatUser = "";

function openChat(uid){
    document.querySelectorAll(".chat-user").forEach(el=>{
        el.classList.remove("active-chat");
    });

    currentChatUser = uid;
    currentGroup = null;

    // ✅ RESET GROUP BACKGROUND (FIX THEME BUG)
    document.getElementById("chatBox").style.background = "";

    localStorage.setItem("lastChatUser", uid);

    const user = allUsers.find(u => u.uid === uid);

    document.getElementById("emptyState").style.display = "none";
    document.getElementById("chatUI").style.display = "flex";

    document.getElementById("chatTitle").innerText =
    uid === auth.currentUser.uid
    ? "Saved Messages (You)"
    : (user ? user.name : "User");

    loadMessages();
}

function openGroup(id, name, theme){
    document.querySelectorAll(".chat-user").forEach(el=>{
        el.classList.remove("active-chat");
    });

    groupTheme = theme;
    currentGroup = id;
    currentChatUser = null;

    document.getElementById("emptyState").style.display = "none";
    document.getElementById("chatUI").style.display = "flex";
    document.getElementById("chatTitle").innerText = name;

    loadGroupMessages();
}
    
async function sendMsg(){
    const input = document.getElementById("msgInput");
    const text = input.value.trim();

    if(!text || (!currentChatUser && !currentGroup)) return;

    const user = auth.currentUser;

    await addDoc(collection(db, "messages"), {
        text: text,
        from: user.uid,
        to: currentChatUser || null,
        groupId: currentGroup || null,
        time: Date.now()
    });

    input.value="";
}

document.getElementById("msgInput").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMsg();
    }
});

/* INDICATOR */
const links = document.querySelectorAll(".sidebar a");
const indicator = document.getElementById("indicator");

links.forEach(link=>{
link.onclick=()=>{
links.forEach(l=>l.classList.remove("active"));
link.classList.add("active");

indicator.style.top = link.offsetTop+"px";
indicator.style.height = link.offsetHeight+"px";
};
});

window.addEventListener("load",()=>{
const active = document.querySelector(".sidebar a.active");
indicator.style.top = active.offsetTop+"px";
indicator.style.height = active.offsetHeight+"px";
});

/* FAKE USER DATABASE (replace later with Firebase) */
const users = [
    "Bryan",
    "Alex",
    "John",
    "Jane"
];

/* SEARCH USER */
document.getElementById("userSearch").addEventListener("input", function(){
    const value = this.value.toLowerCase();
    const results = document.getElementById("userResults");
    results.innerHTML = "";

if(!value){
    loadChatList(); // 🔥 restore chats
    return;
}

    const filtered = allUsers.filter(u => u.name.toLowerCase().includes(value));

    if(filtered.length === 0){
        results.innerHTML = `<div class="not-found">User not found</div>`;
        return;
    }

    filtered.forEach(user=>{
    results.innerHTML += `
        <div class="chat-user" onclick="openChat('${user.uid}')">
            ${user.name}
        </div>
    `;
});
});

document.getElementById("groupSearch").addEventListener("input", function(){
    const value = this.value.toLowerCase();
    const box = document.getElementById("groupUsers");
    box.innerHTML = "";

    const filtered = allUsers.filter(u => 
        u.name.toLowerCase().includes(value)
    );

    filtered.forEach(user=>{
        box.innerHTML += `
            <div class="chat-user" onclick="addMember('${user.uid}', '${user.name}')">
                ${user.name}
            </div>
        `;
    });
});
    

/* GROUP PANEL */
function openGroupPanel(){
    document.getElementById("groupPanel").classList.toggle("open");
}

/* CREATE GROUP (demo only) */
async function createGroup(){
    const name = document.getElementById("groupName").value.trim();
    const theme = document.getElementById("groupTheme").value;

    if(!name){
    alert("Enter group name");
    return;
}

if(selectedMembers.length === 0){
    alert("Select at least 1 member");
    return;
}

    const myId = auth.currentUser.uid;

    const groupData = {
        name: name,
        theme: theme,
        members: [myId, ...selectedMembers],
        type: "group",
        createdAt: Date.now()
    };

    const docRef = await addDoc(collection(db, "groups"), groupData);
    openGroup(docRef.id, name, theme); // ✅ OPEN AFTER CREATE
    
    // reset UI
    document.getElementById("groupPanel").classList.remove("open");
    document.getElementById("groupName").value = "";
    document.getElementById("selectedMembers").innerHTML = "";
    selectedMembers = [];

    loadChatList(); // refresh sidebar
}

function addMember(uid, name){
    if(uid === auth.currentUser.uid) return; // 🚫 block yourself
    if(selectedMembers.includes(uid)) return;

    selectedMembers.push(uid);
    renderMembers();

    document.getElementById("groupSearch").value = "";
    document.getElementById("groupUsers").innerHTML = "";
}

function renderMembers(){
    const box = document.getElementById("selectedMembers");
    box.innerHTML = "";

    selectedMembers.forEach(uid=>{
        const user = allUsers.find(u=>u.uid===uid);

        box.innerHTML += `
            <span class="member-chip" onclick="removeMember('${uid}')">
                ${user ? user.name : "User"} ✕
            </span>
        `;
    });
}

function removeMember(uid){
    selectedMembers = selectedMembers.filter(id => id !== uid);
    renderMembers();
}

function loadMessages(){
    const box = document.getElementById("messages");
    if(unsubscribe) unsubscribe();

    const q = query(collection(db, "messages"));

    unsubscribe = onSnapshot(q, (snap)=>{
        box.innerHTML = "";
        const messages = [];

        snap.forEach(docSnap=>{
            const m = docSnap.data();
            const id = docSnap.id;

            const isChat =
                (m.from === auth.currentUser.uid && m.to === currentChatUser) ||
                (m.from === currentChatUser && m.to === auth.currentUser.uid);

            if(isChat){
                messages.push({ ...m, id }); // ✅ FIXED
            }
        });

        messages.sort((a,b)=> a.time - b.time);

        messages.forEach(m=>{
            box.innerHTML += `
                <div class="msg ${m.from === auth.currentUser.uid ? "me" : "other"}"
                     oncontextmenu="openMsgMenu(event, '${m.id}'); return false;">
                    ${m.text}
                    <div style="font-size:10px;opacity:.6;margin-top:4px;">
                        ${new Date(m.time).toLocaleDateString()} • ${new Date(m.time).toLocaleTimeString()}
                    </div>
                </div>
            `;
        });

        box.scrollTop = box.scrollHeight;
    });
}

async function loadGroupMessages(){
    const box = document.getElementById("messages");

    if(unsubscribe) unsubscribe();

    const q = query(collection(db, "messages"));

    document.getElementById("chatBox").style.background = groupTheme + "22";

    unsubscribe = onSnapshot(q, (snap)=>{
        box.innerHTML = "";

        const messages = [];

        snap.forEach(docSnap=>{
            const m = docSnap.data();
            const id = docSnap.id;
            if(m.groupId === currentGroup){
                messages.push({ ...m, id });
            }
        });

        // ✅ SORT
        messages.sort((a,b)=> a.time - b.time);

        // ✅ DISPLAY
        messages.forEach(m=>{
            const user = allUsers.find(u => u.uid === m.from);

            box.innerHTML += `
                <div class="msg ${m.from === auth.currentUser.uid ? "me" : "other"}"
                     style="
                        background:${m.from === auth.currentUser.uid ? groupTheme : groupTheme + "33"};
                        color:${m.from === auth.currentUser.uid ? "#000" : "#fff"};
                     ">
                     
                    <div style="font-size:11px;opacity:.7;">
                        ${user ? user.name : "User"}
                    </div>

                    ${m.text}

                    <div style="font-size:10px;opacity:.6;margin-top:4px;">
                        ${new Date(m.time).toLocaleDateString()} • ${new Date(m.time).toLocaleTimeString()}
                    </div>
                </div>
            `;
        });

        box.scrollTop = box.scrollHeight;

    });
}

function showEmptyState(){
    document.getElementById("emptyState").style.display = "block";
    document.getElementById("chatUI").style.display = "none";
}

import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

document.getElementById("logoutBtn").onclick = async () => {
    await signOut(auth);
    window.location.href = "index.html";
};

document.getElementById("closeChat").onclick = () => {
    currentChatUser = null;
    currentGroup = null;

    if(unsubscribe) unsubscribe();

    document.getElementById("chatUI").style.display = "none";
    document.getElementById("emptyState").style.display = "block";
    document.getElementById("messages").innerHTML = "";
    document.getElementById("chatBox").style.background = "";
};

let selectedMsgId = null;

function openMsgMenu(e, id){
    selectedMsgId = id;
    const menu = document.getElementById("msgMenu");

    menu.style.display = "block";
    menu.style.left = e.pageX + "px";
    menu.style.top = e.pageY + "px";
}

document.addEventListener("click", (e) => {
    const menu = document.getElementById("msgMenu");
    if(!menu.contains(e.target)){
        menu.style.display = "none";
    }
});

async function deleteMessage(){
    if(!selectedMsgId) return;

    await deleteDoc(doc(db, "messages", selectedMsgId));

    document.getElementById("msgMenu").style.display = "none";
}

// 🔥 MAKE FUNCTIONS GLOBAL (IMPORTANT)
window.deleteMessage = deleteMessage;
window.openMsgMenu = openMsgMenu;
window.createGroup = createGroup;
window.addMember = addMember;
window.removeMember = removeMember;
window.openGroup = openGroup;
window.openChat = openChat;
window.toggleSidebar = toggleSidebar;
window.openGroupPanel = openGroupPanel;
window.sendMsg = sendMsg;
</script>

<div id="msgMenu" style="
    position:fixed;
    background:#1f2937;
    padding:10px;
    border-radius:10px;
    display:none;
    z-index:2000;
">
    <div onclick="deleteMessage()" style="cursor:pointer;color:#ff4b4b;">
        Delete Message
    </div>
</div>
    
</body>
</html>
